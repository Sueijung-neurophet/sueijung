/* ══════════════════════════════════════════
   TAB2 STATE
══════════════════════════════════════════ */
// Scenarios: [{id, title, flow:[{...SC entry, memo:'', flagged:false}]}]
let t2Scenarios = [];
let t2CurScIdx = -1;  // which scenario
let t2CurFlowIdx = -1; // which step in current flow
let t2IsPlaying = false;
let t2PlaySpeed = 1;
let t2AnimId = null;
let t2StartT = null;
let t2PreviewAnimId = null;

function t2GetScenario() { return t2Scenarios[t2CurScIdx] || null; }
function t2GetFlow() { const sc = t2GetScenario(); return sc ? sc.flow : []; }
function t2GetStep() { const f = t2GetFlow(); return f[t2CurFlowIdx] || null; }

/* ── Sync from Tab1 ──
   SC_LIB mirrors SC[] but with just what's needed for tab2 */
function t2SyncedSC() {
  // Build lib entries from tab1's SC and overrides (synced abbreviations/motions)
  return SC.map((s, i) => {
    const ov = overrides[i];
    const firstStep = ov.steps[0];
    return {
      name: s.name,
      abbr: firstStep.abbr,
      motionId: firstStep.motionId,
      speedId: firstStep.speedId,
      soundId: firstStep.soundId,
      type: s.type,
      group: s.group,
      desc: s.desc,
      action: s.action,
      status: ov.status,
      // Multi-step support: pass all steps
      steps: ov.steps,
      customRender: s.customRender || null,
      _scIdx: i,
    };
  });
}

/* ══════════════════════════════════════════
   TAB2 LIBRARY
══════════════════════════════════════════ */
function t2BuildLib() {
  const scroll = document.getElementById('t2-lib-scroll');
  if(!scroll) return;
  scroll.innerHTML = '';
  const lib = t2SyncedSC();
  const groups = [...new Set(lib.map(s => s.group))];
  groups.forEach(g => {
    const lbl = document.createElement('div');
    lbl.className = 't2-group-lbl';
    lbl.textContent = g;
    scroll.appendChild(lbl);
    lib.filter(s => s.group === g).forEach(s => {
      const el = document.createElement('div');
      el.className = 't2-lib-item';
      el.dataset.type = s.type;
      el.dataset.scIdx = s._scIdx;
      el.innerHTML = `
        <div class="t2-lib-dot"></div>
        <div class="t2-lib-name">${s.name}</div>
        <div class="t2-lib-abbr">${s.abbr||'-'}</div>
      `;
      el.onclick = () => t2AddStep(s._scIdx);
      scroll.appendChild(el);
    });
  });
}

function t2FilterLib(q) {
  const qq = q.toLowerCase();
  document.querySelectorAll('.t2-lib-item').forEach(el => {
    const name = el.querySelector('.t2-lib-name').textContent.toLowerCase();
    const abbr = el.querySelector('.t2-lib-abbr').textContent.toLowerCase();
    el.classList.toggle('t2-hidden', !!qq && !name.includes(qq) && !abbr.includes(qq));
  });
  document.querySelectorAll('.t2-group-lbl').forEach(lbl => {
    let next = lbl.nextElementSibling;
    let all = true;
    while(next && next.classList.contains('t2-lib-item')) {
      if(!next.classList.contains('t2-hidden')) all = false;
      next = next.nextElementSibling;
    }
    lbl.style.display = (all && qq) ? 'none' : '';
  });
}

/* ══════════════════════════════════════════
   SCENARIO MANAGEMENT
══════════════════════════════════════════ */
function t2NewScenario(title) {
  const id = 't2sc_' + Date.now();
  const sc = { id, title: title || '새 시나리오 ' + (t2Scenarios.length + 1), flow: [] };
  t2Scenarios.push(sc);
  t2CurScIdx = t2Scenarios.length - 1;
  t2CurFlowIdx = -1;
  t2ShowFlowArea();
  t2RenderScTabs();
  t2RenderFlow();
  t2RenderDetail();
  t2UpdateTitleInput();
  // Focus title input
  setTimeout(() => {
    const inp = document.getElementById('t2-title-input');
    if(inp) { inp.focus(); inp.select(); }
  }, 50);
  t2UpdateExportCount();
}

function t2SelectScenario(idx) {
  if(t2IsPlaying) t2StopPlay();
  t2CurScIdx = idx;
  t2CurFlowIdx = t2GetFlow().length > 0 ? 0 : -1;
  t2ShowFlowArea();
  t2RenderScTabs();
  t2RenderFlow();
  t2RenderDetail();
  t2UpdateTitleInput();
  t2StartT = null;
  t2StartPreviewLoop();
}

function t2DeleteScenario(idx, e) {
  if(e) e.stopPropagation();
  const sc = t2Scenarios[idx];
  if(!confirm(`"${sc.title}" 시나리오를 삭제하시겠습니까?`)) return;
  if(t2IsPlaying) t2StopPlay();
  t2Scenarios.splice(idx, 1);
  if(t2CurScIdx >= t2Scenarios.length) t2CurScIdx = t2Scenarios.length - 1;
  t2CurFlowIdx = -1;
  t2RenderScTabs();
  if(t2Scenarios.length === 0) {
    t2CurScIdx = -1;
    t2CurFlowIdx = -1;
    t2ShowNoScenario();
    t2RenderDetail();
  } else {
    t2SelectScenario(t2CurScIdx);
  }
  t2UpdateExportCount();
}

function t2UpdateTitleInput() {
  const inp = document.getElementById('t2-title-input');
  if(!inp) return;
  const sc = t2GetScenario();
  inp.value = sc ? sc.title : '';
}

function t2OnTitleChange(val) {
  const sc = t2GetScenario();
  if(!sc) return;
  sc.title = val || '(제목 없음)';
  t2RenderScTabs();
}

function t2ShowNoScenario() {
  document.getElementById('t2-flow-canvas').style.display = 'none';
  document.getElementById('t2-flow-toolbar').style.display = 'none';
  const empty = document.getElementById('t2-sc-empty');
  if(empty) empty.style.display = '';
}
function t2ShowFlowArea() {
  document.getElementById('t2-flow-canvas').style.display = '';
  document.getElementById('t2-flow-toolbar').style.display = '';
  const empty = document.getElementById('t2-sc-empty');
  if(empty) empty.style.display = 'none';
}

/* ══════════════════════════════════════════
   FLOW MANAGEMENT
══════════════════════════════════════════ */
function t2AddStep(scIdx) {
  if(t2CurScIdx < 0) {
    t2NewScenario();
  }
  const sc = t2GetScenario();
  if(!sc) return;
  const lib = t2SyncedSC();
  const entry = lib.find(s => s._scIdx === scIdx);
  if(!entry) return;
  sc.flow.push({ ...entry, memo: '', flagged: false });
  if(t2IsPlaying) t2StopPlay();
  t2RenderFlow();
  t2SelectFlowStep(sc.flow.length - 1);
  t2ShowFlowArea();
}

function t2RemoveStep(i) {
  const sc = t2GetScenario();
  if(!sc) return;
  sc.flow.splice(i, 1);
  if(t2CurFlowIdx >= sc.flow.length) t2CurFlowIdx = sc.flow.length - 1;
  if(t2IsPlaying) t2StopPlay();
  t2RenderFlow();
  if(sc.flow.length > 0) t2SelectFlowStep(Math.min(t2CurFlowIdx, sc.flow.length - 1));
  else { t2CurFlowIdx = -1; t2RenderDetail(); }
}

function t2ClearFlow() {
  const sc = t2GetScenario();
  if(!sc || !sc.flow.length) return;
  if(!confirm('이 시나리오의 플로우를 초기화하시겠습니까?')) return;
  sc.flow = [];
  t2CurFlowIdx = -1;
  if(t2IsPlaying) t2StopPlay();
  t2RenderFlow();
  t2RenderDetail();
}

/* ══════════════════════════════════════════
   RENDER
══════════════════════════════════════════ */
function t2RenderScTabs() {
  const bar = document.getElementById('t2-sc-tabbar');
  if(!bar) return;
  // Keep + button
  bar.innerHTML = '';
  const newBtn = document.createElement('button');
  newBtn.className = 't2-new-sc-btn';
  newBtn.title = '새 시나리오';
  newBtn.textContent = '＋';
  newBtn.onclick = () => t2NewScenario();
  bar.appendChild(newBtn);

  t2Scenarios.forEach((sc, i) => {
    const tab = document.createElement('button');
    tab.className = 't2-sc-tab' + (i === t2CurScIdx ? ' t2-sc-active' : '');
    const hasFlagged = sc.flow.some(s => s.flagged);
    tab.innerHTML = `
      <span class="t2-sc-tab-label">${sc.title}</span>
      ${hasFlagged ? '<span style="font-size:9px;color:var(--err);pointer-events:none">⚑</span>' : ''}
    `;
    // 복사 버튼
    const copyBtn = document.createElement('span');
    copyBtn.className = 't2-sc-tab-copy';
    copyBtn.title = '시나리오 복사';
    copyBtn.textContent = '⎘';
    copyBtn.addEventListener('click', (e) => { e.stopPropagation(); t2CopyScenario(i); });
    tab.appendChild(copyBtn);
    // × 버튼을 JS로 생성하여 이벤트 완전 제어
    const closeBtn = document.createElement('span');
    closeBtn.className = 't2-sc-tab-close';
    closeBtn.textContent = '×';
    closeBtn.addEventListener('click', (e) => { e.stopPropagation(); t2DeleteScenario(i, e); });
    tab.appendChild(closeBtn);
    tab.addEventListener('click', () => t2SelectScenario(i));
    bar.appendChild(tab);
  });
}

function t2RenderFlow() {
  const canvas = document.getElementById('t2-flow-canvas');
  if(!canvas) return;
  canvas.querySelectorAll('.t2-flow-node, .t2-add-zone, .t2-add-actions').forEach(el => el.remove());

  const sc = t2GetScenario();
  const flow = sc ? sc.flow : [];
  const empty = document.getElementById('t2-flow-empty');

  if(!sc || flow.length === 0) {
    if(empty) empty.style.display = '';
    return;
  }
  if(empty) empty.style.display = 'none';

  // step 번호는 signal/empty만 카운트
  let stepNum = 0;
  flow.forEach((step, i) => {
    let node;
    if(step.type === 'section') {
      node = t2BuildSectionNode(step, i, flow);
    } else if(step.type === 'empty') {
      stepNum++;
      step._stepNum = stepNum;
      node = t2BuildEmptySlotNode(step, i, flow);
    } else {
      // signal (기존)
      stepNum++;
      node = document.createElement('div');
      node.className = 't2-flow-node'
        + (i === t2CurFlowIdx ? ' t2-active' : '')
        + (step.type === 'warn' ? ' t2-warn-node' : step.type === 'err' ? ' t2-err-node' : '');
      node.id = 't2-node-' + i;

      const conn = document.createElement('div');
      conn.className = 't2-node-connector';
      conn.innerHTML = `<div class="t2-conn-dot"></div><div class="t2-conn-line" ${i === flow.length-1 ? 'style="display:none"':''}></div>`;

      const card = document.createElement('div');
      card.className = 't2-flow-card' + (i === t2CurFlowIdx ? ' t2-active' : '');
      card.id = 't2-card-' + i;
      const motOff = !!step.motionOff;
    const sndOff = !!step.soundOff;
    card.className = 't2-flow-card' + (i === t2CurFlowIdx ? ' t2-active' : '') + (motOff ? ' t2-motion-off' : '');
    card.innerHTML = `
        <div class="t2-fc-row1">
          <span class="t2-drag-handle" title="드래그하여 순서 변경">⠿⠿</span>
          <span class="t2-fc-step">STEP ${stepNum}</span>
          <span class="t2-fc-name">${step.name}</span>
          <span class="t2-fc-abbr">${step.abbr||''}</span>
          ${step.flagged ? '<span class="t2-fc-flag">⚑</span>' : ''}
          <button class="t2-fc-del" onclick="event.stopPropagation();t2RemoveStep(${i})">×</button>
        </div>
        <div class="t2-fc-desc">${t2Trunc(step.desc||'', 80)}</div>
        <div class="t2-fx-row">
          <span class="t2-fx-chip${motOff?' t2-fx-off':''}" id="t2-fx-mot-${i}" title="모션 ${motOff?'(꺼짐)':'(켜짐)'}">
            <span class="t2-fx-dot">${motOff?'○':'●'}</span> MOT
          </span>
          <span class="t2-fx-chip${sndOff?' t2-fx-off':''}" id="t2-fx-snd-${i}" title="소리 ${sndOff?'(꺼짐)':'(켜짐)'}">
            <span class="t2-fx-dot">${sndOff?'○':'●'}</span> SND
          </span>
        </div>
        <div class="t2-fc-prog" id="t2-prog-${i}"></div>
      `;
    // 칩 클릭 이벤트 (innerHTML 후 DOM 접근)
    requestAnimationFrame(() => {
      const motChip = document.getElementById('t2-fx-mot-' + i);
      const sndChip = document.getElementById('t2-fx-snd-' + i);
      if(motChip) motChip.addEventListener('click', e => {
        e.stopPropagation();
        step.motionOff = !step.motionOff;
        t2StartT = null;
        t2RenderFlow();
        if(t2CurFlowIdx === i) t2RenderDetail();
      });
      if(sndChip) sndChip.addEventListener('click', e => {
        e.stopPropagation();
        step.soundOff = !step.soundOff;
        t2StartT = null;
        if(t2CurFlowIdx === i) t2RenderDetail();
        // 칩만 교체 (전체 렌더 없이)
        sndChip.className = 't2-fx-chip' + (step.soundOff ? ' t2-fx-off' : '');
        sndChip.innerHTML = `<span class="t2-fx-dot">${step.soundOff?'○':'●'}</span> SND`;
      });
    });
      card.setAttribute('draggable', 'true');
      card.onclick = () => { if(!t2IsPlaying) t2SelectFlowStep(i); else t2JumpTo(i); };
      node.appendChild(conn);
      node.appendChild(card);
    }
    canvas.appendChild(node);
  });

  // add actions
  const addActions = document.createElement('div');
  addActions.className = 't2-add-actions';
  addActions.innerHTML = `
    <button class="t2-add-action-btn" onclick="t2AddEmptySlot()" title="시그널을 나중에 지정할 빈 슬롯">
      <span style="font-size:12px">+</span> 빈 슬롯 추가
    </button>
    <button class="t2-add-action-btn" onclick="t2AddSection()" title="플로우에 섹션 구분선 추가">
      <span style="font-size:10px;letter-spacing:.05em">§</span> 섹션 추가
    </button>
  `;
  canvas.appendChild(addActions);

  t2UpdateDoneNodes();
  // 드래그앤드롭 이벤트 바인딩
  requestAnimationFrame(() => t2SetupDragDrop());
}

function t2Trunc(str, n) { return (str||'').length > n ? str.slice(0,n)+'…' : (str||''); }

function t2SelectFlowStep(i) {
  const flow = t2GetFlow();
  // section은 선택 대상에서 제외 → 다음 signal/empty 탐색
  if(flow[i] && flow[i].type === 'section') return;
  t2CurFlowIdx = i;
  document.querySelectorAll('.t2-flow-node').forEach((el, j) => {
    const a = j === i;
    el.classList.toggle('t2-active', a);
    el.querySelector('.t2-flow-card')?.classList.toggle('t2-active', a);
    el.querySelector('.t2-empty-slot-card')?.classList.toggle('t2-active', a);
  });
  t2RenderDetail();
  document.getElementById('t2-card-'+i)?.scrollIntoView({behavior:'smooth',block:'nearest'});
  t2StartT = null;
  t2UpdateMotionText();
}

function t2UpdateDoneNodes() {
  const flow = t2GetFlow();
  flow.forEach((_, i) => {
    const node = document.getElementById('t2-node-'+i);
    if(!node) return;
    if(t2IsPlaying && i < t2CurFlowIdx) node.classList.add('t2-done');
    else node.classList.remove('t2-done');
  });
}

function t2UpdateMotionText() {
  const step = t2GetStep();
  const el = document.getElementById('t2-motion-text');
  if(!el) return;
  if(!step) { el.textContent = '대기 중'; return; }
  const m = MOTION_OPTS.find(mo => mo.id === step.motionId);
  el.textContent = (m?.name || step.motionId) + ' — ' + (step.abbr||'');
}

}

/* ══════════════════════════════════════════
   TAB2 PLAYBACK
══════════════════════════════════════════ */
function t2TogglePlay() {
  if(t2IsPlaying) t2StopPlay();
  else t2StartPlay();
}

function t2StartPlay() {
  const flow = t2GetFlow();
  if(!flow.length) return;
  t2IsPlaying = true;
  if(t2CurFlowIdx < 0 || t2CurFlowIdx >= flow.length) t2CurFlowIdx = 0;
  document.getElementById('t2-run-btn').textContent = '■ 정지';
  document.getElementById('t2-run-btn').classList.add('t2-running');
  document.getElementById('t2-pp-btn').textContent = '■';
  document.getElementById('t2-pp-btn').classList.add('t2-playing');
  document.getElementById('t2-play-info').style.display = '';
  t2StartT = null;
  cancelAnimationFrame(t2PreviewAnimId);
  t2SelectFlowStep(t2CurFlowIdx);
  t2AnimLoop(performance.now());
}

function t2StopPlay() {
  t2IsPlaying = false;
  cancelAnimationFrame(t2AnimId);
  document.getElementById('t2-run-btn').textContent = '▶ 실행';
  document.getElementById('t2-run-btn').classList.remove('t2-running');
  document.getElementById('t2-pp-btn').textContent = '▶';
  document.getElementById('t2-pp-btn').classList.remove('t2-playing');
  document.getElementById('t2-play-info').style.display = 'none';
  document.querySelectorAll('[id^="t2-prog-"]').forEach(el => el.style.width = '0');
  t2UpdateDoneNodes();
  t2StartPreviewLoop();
}

function t2SetSpeed(s, btn) {
  t2PlaySpeed = s;
  document.querySelectorAll('.t2-speed-chip').forEach(el => el.classList.remove('t2-chip-on'));
  btn.classList.add('t2-chip-on');
}

function t2StepNext() {
  const flow = t2GetFlow();
  if(t2CurFlowIdx < flow.length - 1) t2SelectFlowStep(t2CurFlowIdx + 1);
}
function t2StepPrev() {
  if(t2CurFlowIdx > 0) t2SelectFlowStep(t2CurFlowIdx - 1);
}
function t2JumpTo(i) {
  t2CurFlowIdx = i;
  t2StartT = null;
  t2SelectFlowStep(i);
}

function t2AnimLoop(ts) {
  if(!t2IsPlaying) return;
  if(t2StartT === null) t2StartT = ts;
  const flow = t2GetFlow();
  let step = flow[t2CurFlowIdx];
  // section/empty는 재생 대상 아님 - 다음 signal 탐색
  while(step && (step.type === 'section' || step.type === 'empty')) {
    t2CurFlowIdx++;
    if(t2CurFlowIdx >= flow.length) { t2StopPlay(); return; }
    step = flow[t2CurFlowIdx];
  }
  if(!step) { t2StopPlay(); return; }

  const elapsed = (ts - t2StartT) * t2PlaySpeed;
  const dur = t2StepDur(step);

  const sc = SC[step._scIdx];
  const {cols, rows} = getRes();
  const ms = SPEED_OPTS.find(s => s.id === step.speedId)?.ms || 1000;
  // motionOff: static으로 대체
  const effectiveMotionId = step.motionOff ? 'static' : step.motionId;
  const motion = MOTION_OPTS.find(m => m.id === effectiveMotionId) || MOTION_OPTS[0];
  const t = elapsed;
  let result;
  if(sc && sc.customRender && !step.motionOff) result = sc.customRender(t, step.abbr, cols, rows);
  else result = motion.render(t, step.abbr, cols, rows, ms);
  if(!sc?.customRender || step.motionOff) {
    const selfPx = effectiveMotionId==='sweep_lr'||effectiveMotionId==='sweep_rl'||effectiveMotionId==='expand';
    if(!selfPx) result = {...result, pixels: textPxCentered(step.abbr, cols, rows)};
  }
  t2DrawFrame(result.pixels, result.alpha, step.type);

  const prog = document.getElementById('t2-prog-'+t2CurFlowIdx);
  if(prog) prog.style.width = Math.min(100, (elapsed/dur)*100) + '%';
  document.getElementById('t2-play-step').textContent = (t2CurFlowIdx+1)+'/'+flow.length;

  if(elapsed >= dur) {
    // soundOff면 소리 생략
    if(!step.soundOff) t2PlaySnd(step.soundId);
    if(t2CurFlowIdx < flow.length - 1) {
      t2CurFlowIdx++;
      t2StartT = ts;
      t2SelectFlowStep(t2CurFlowIdx);
    } else {
      t2StopPlay();
      return;
    }
  }
  t2AnimId = requestAnimationFrame(t2AnimLoop);
}

function t2StepDur(step) {
  const ms = SPEED_OPTS.find(s => s.id === step.speedId)?.ms || 1000;
  const map = {
    static:3000, fadein:1200, fadeout:1200,
    blink:ms*4, blink3:ms*3+600, blink2:ms*2+600,
    sweep_lr:ms, sweep_rl:ms, pulse_glow:ms*3, expand:ms*3,
  };
  return map[step.motionId] || 2000;
}

/* ── Preview loop (when not playing) ── */
function t2StartPreviewLoop() {
  cancelAnimationFrame(t2PreviewAnimId);
  t2StartT = null;
  function loop(ts) {
    if(t2IsPlaying || activeTab !== 'tab2') return;
    if(t2StartT === null) t2StartT = ts;
    const step = t2GetStep();
    if(!step) { t2DrawFrame([], 0, 'normal'); t2PreviewAnimId = requestAnimationFrame(loop); return; }
    const elapsed = ts - t2StartT;
    const sc = SC[step._scIdx];
    const {cols, rows} = getRes();
    const ms = SPEED_OPTS.find(s => s.id === step.speedId)?.ms || 1000;
    const effectiveMotionId = step.motionOff ? 'static' : step.motionId;
    const motion = MOTION_OPTS.find(m => m.id === effectiveMotionId) || MOTION_OPTS[0];
    let result;
    if(sc && sc.customRender && !step.motionOff) result = sc.customRender(elapsed, step.abbr, cols, rows);
    else result = motion.render(elapsed, step.abbr, cols, rows, ms);
    if(!sc?.customRender || step.motionOff) {
      const selfPx = effectiveMotionId==='sweep_lr'||effectiveMotionId==='sweep_rl'||effectiveMotionId==='expand';
      if(!selfPx) result = {...result, pixels: textPxCentered(step.abbr, cols, rows)};
    }
    t2DrawFrame(result.pixels, result.alpha, step.type);
    t2PreviewAnimId = requestAnimationFrame(loop);
  }
  t2PreviewAnimId = requestAnimationFrame(loop);
}

/* ══════════════════════════════════════════
   TAB2 CANVAS DRAW
══════════════════════════════════════════ */
function t2DrawFrame(pixels, alpha, type) {
  const {cols, rows, dot, gap} = getRes();
  const dpr = window.devicePixelRatio || 1;
  const mode = t2PreviewMode || 'signal';

  let dotOnColor, dotOffColor, drawAsCircle, glowColor;
  if(mode === 'bw') {
    // 흑백 선명: 진한 검정 원형 도트
    dotOnColor  = (a) => `rgba(20,20,22,${a})`;
    dotOffColor = 'rgba(20,20,22,0.08)';
    drawAsCircle = true;
    glowColor = null;
  } else if(mode === 'real') {
    // 실사: teal LED + soft glow, 원형
    dotOnColor  = (a) => `rgba(0,207,189,${a})`;
    dotOffColor = 'rgba(150,160,165,0.07)';
    drawAsCircle = true;
    glowColor = 'rgba(0,230,220,0.55)';
  } else {
    // 신호: type 색상, 사각형
    const rgb = type==='warn' ? '240,160,64' : type==='err' ? '224,74,74' : '0,207,189';
    dotOnColor  = (a) => `rgba(${rgb},${a})`;
    dotOffColor = '#1c3d38';
    drawAsCircle = false;
    glowColor = null;
  }

  const canvas = document.getElementById('t2-dot-canvas');
  if(!canvas) return;
  const cssW = cols*(dot+gap)-gap;
  const cssH = rows*(dot+gap)-gap;
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width  = cssW + 'px';
  canvas.style.height = cssH + 'px';
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, cssW, cssH);
  const set = new Set((pixels||[]).map(([r,c]) => r+','+c));
  for(let r=0; r<rows; r++) {
    for(let c=0; c<cols; c++) {
      const x = c*(dot+gap), y = r*(dot+gap);
      const isOn = set.has(r+','+c);
      ctx.beginPath();
      if(drawAsCircle) {
        ctx.arc(x+dot/2, y+dot/2, dot*0.45, 0, Math.PI*2);
      } else {
        ctx.roundRect(x, y, dot, dot, Math.max(1.5, dot*0.22));
      }
      if(isOn && alpha > 0.05) {
        ctx.fillStyle = dotOnColor(Math.min(1, alpha));
        if(glowColor) { ctx.shadowColor = glowColor; ctx.shadowBlur = Math.max(3, dot*0.6); }
        else { ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0; }
      } else {
        ctx.fillStyle = dotOffColor;
        ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
      }
      ctx.fill();
    }
  }
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
}


/* ── Sound (tab2 shares audio ctx) ── */
function t2PlaySnd(id) {
  playSound(id); // reuse tab1's sound fn
  // animate t2 sound vis
  if(id && id !== 'none' && !muted) {
    const bars = document.querySelectorAll('#t2-snd-vis .snd-bar');
    [10,14,8,12].forEach((h,i) => bars[i] && (bars[i].style.height = h+'px'));
    setTimeout(() => bars.forEach(b => b.style.height='3px'), 400);
  }
}
function t2PreviewSound() {
  const step = t2GetStep();
  if(step) t2PlaySnd(step.soundId || 'none');
}

/* ══════════════════════════════════════════
   EXPORT
══════════════════════════════════════════ */
function t2ExportFlow() {
  const sc = t2GetScenario();
  if(!sc || !sc.flow.length) { alert('플로우가 비어 있습니다.'); return; }
  const now = new Date().toLocaleString('ko-KR');
  const flagCount = sc.flow.filter(s => s.flagged).length;
  let lines = [
    `innk Scenario Flow — ${sc.title}`,
    `생성일시: ${now}`,
    `총 스텝: ${sc.flow.length}개 | 이슈 플래그: ${flagCount}개`,
    '',
    '─'.repeat(48),
  ];
  sc.flow.forEach((step, i) => {
    lines.push(`STEP ${i+1}. ${step.name} [${step.abbr||'-'}]`);
    lines.push(`  유형: ${step.type} | 모션: ${MOTION_OPTS.find(m=>m.id===step.motionId)?.name||step.motionId} | 소리: ${step.soundId||'none'}`);
    lines.push(`  설명: ${step.desc||''}`);
    if(step.action) lines.push(`  액션: ${step.action}`);
    if(step.flagged) lines.push(`  ⚑ 이슈 표시됨`);
    if(step.memo) lines.push(`  메모: ${step.memo}`);
    lines.push('');
  });
  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `innk_scenario_${Date.now()}.txt`; a.click();
  URL.revokeObjectURL(url);
}

/* ══════════════════════════════════════════
   TAB2 BOOT
══════════════════════════════════════════ */
function tab2Boot() {
  t2BuildLib();
  // Load title change listener
  const inp = document.getElementById('t2-title-input');
  if(inp) inp.addEventListener('input', e => t2OnTitleChange(e.target.value));
  // Create default scenario
  t2NewScenario('기본 시나리오');
  // Add default flow: 부팅 → 자극 준비 → GO → UP → DC → DN → OK
  const defaultNames = ['전원 켬 → 부팅','자극 가능 대기 (tDCS)','자극 시작','상승시간 (Ramp Up)','자극 진행 중 (DC)','하강시간 (Ramp Down)','자극 정상 완료'];
  const lib = t2SyncedSC();
  defaultNames.forEach(name => {
    const entry = lib.find(s => s.name === name);
    if(entry) {
      const sc = t2GetScenario();
      sc.flow.push({...entry, memo:'', flagged:false});
    }
  });
  t2RenderFlow();
  t2SelectFlowStep(0);
  t2ShowFlowArea();
  t2UpdateExportCount();
  t2StartPreviewLoop();
}

/* ══════════════════════════════════════════
   DRAG-AND-DROP (TAB2 FLOW)
══════════════════════════════════════════ */
let t2DragSrcIdx = null;

function t2SetupDragDrop() {
  const nodes = document.querySelectorAll('.t2-flow-node');
  nodes.forEach((node, i) => {
    const card = node.querySelector('.t2-flow-card, .t2-empty-slot-card, .t2-section-card');
    if(!card) return;

    // input/textarea는 드래그 비활성화 (텍스트 선택과 충돌 방지)
    card.querySelectorAll('input, textarea').forEach(el => {
      el.setAttribute('draggable', 'false');
      el.addEventListener('mousedown', e => e.stopPropagation());
    });

    // 드래그 핸들에서만 draggable 활성화
    const handle = card.querySelector('.t2-drag-handle');
    if(handle) {
      handle.addEventListener('pointerdown', e => {
        card.setAttribute('draggable', 'true');
      });
    }
    // 초기 draggable=false (핸들 pointerdown 시에만 true)
    card.setAttribute('draggable', 'false');

    card.addEventListener('dragstart', e => {
      // input/textarea가 타깃이면 드래그 차단
      if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        e.preventDefault(); return;
      }
      t2DragSrcIdx = i;
      node.classList.add('t2-dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', String(i));
    });
    card.addEventListener('dragend', () => {
      card.setAttribute('draggable', 'false');
      node.classList.remove('t2-dragging');
      document.querySelectorAll('.t2-flow-node').forEach(n => n.classList.remove('t2-drag-over'));
      t2DragSrcIdx = null;
    });
    node.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(t2DragSrcIdx !== null && t2DragSrcIdx !== i) {
        document.querySelectorAll('.t2-flow-node').forEach(n => n.classList.remove('t2-drag-over'));
        node.classList.add('t2-drag-over');
      }
    });
    node.addEventListener('dragleave', e => {
      if(!node.contains(e.relatedTarget)) node.classList.remove('t2-drag-over');
    });
    node.addEventListener('drop', e => {
      e.preventDefault();
      node.classList.remove('t2-drag-over');
      if(t2DragSrcIdx === null || t2DragSrcIdx === i) return;
      // 배열 순서 변경
      const sc = t2GetScenario();
      if(!sc) return;
      const moved = sc.flow.splice(t2DragSrcIdx, 1)[0];
      const targetIdx = t2DragSrcIdx < i ? i : i;
      const insertAt = t2DragSrcIdx < i ? i : i;
      sc.flow.splice(insertAt, 0, moved);
      // 선택 스텝 추적
      if(t2CurFlowIdx === t2DragSrcIdx) t2CurFlowIdx = insertAt;
      else if(t2DragSrcIdx < t2CurFlowIdx && insertAt >= t2CurFlowIdx) t2CurFlowIdx--;
      else if(t2DragSrcIdx > t2CurFlowIdx && insertAt <= t2CurFlowIdx) t2CurFlowIdx++;
      t2DragSrcIdx = null;
      if(t2IsPlaying) t2StopPlay();
      t2RenderFlow();
      t2SetupDragDrop();
      t2SelectFlowStep(Math.min(t2CurFlowIdx, sc.flow.length-1));
    });
  });
}

/* ── 빈 슬롯 추가 ── */

  const s = t2GetScenario();
  if(!s) return;
  s.flow.push({ type:'empty', name:'(빈 슬롯)', abbr:'', memo:'', flagged:false, _scIdx:-1 });
  if(t2IsPlaying) t2StopPlay();
  t2RenderFlow();
  t2ShowFlowArea();
}

/* ── 섹션 추가 ── */
function t2AddSection() {
  const sc = t2GetScenario();
  if(!sc) { t2NewScenario(); }
  const s = t2GetScenario();
  if(!s) return;
  s.flow.push({ type:'section', sectionTitle:'', sectionDesc:'', name:'[섹션]', abbr:'', memo:'', flagged:false, _scIdx:-2 });

/* ── t2RenderFlowItem: section / empty / signal 분기 ── */
function t2BuildSectionNode(step, i, flow) {
  const node = document.createElement('div');
  node.className = 't2-flow-node';
  node.id = 't2-node-' + i;

  // connector (세로선 없음 - 섹션은 구분자)
  const conn = document.createElement('div');
  conn.className = 't2-node-connector';
  conn.innerHTML = `<div class="t2-conn-dot" style="background:rgba(0,207,189,.3);border-color:rgba(0,207,189,.3)"></div>
    <div class="t2-conn-line" ${i===flow.length-1?'style="display:none"':''}></div>`;

  const card = document.createElement('div');
  card.className = 't2-section-card';
  card.id = 't2-card-' + i;
  card.setAttribute('draggable', 'true');

  const row1 = document.createElement('div');
  row1.className = 't2-section-row1';

  const handle = document.createElement('span');
  handle.className = 't2-drag-handle';
  handle.title = '드래그하여 순서 변경';
  handle.textContent = '⠿⠿';

  const icon = document.createElement('span');
  icon.className = 't2-section-icon';
  icon.textContent = '§';

  const titleInp = document.createElement('input');
  titleInp.className = 't2-section-title-input';
  titleInp.type = 'text';
  titleInp.maxLength = 40;
  titleInp.placeholder = '섹션 이름';
  titleInp.value = step.sectionTitle || '';
  titleInp.addEventListener('input', e => { step.sectionTitle = e.target.value; step.name = e.target.value || '[섹션]'; });
  titleInp.addEventListener('click', e => e.stopPropagation());
  titleInp.addEventListener('keydown', e => e.stopPropagation());
  titleInp.setAttribute('draggable', 'false');

  const delBtn = document.createElement('button');
  delBtn.className = 't2-section-del';
  delBtn.textContent = '×';
  delBtn.title = '섹션 삭제';
  delBtn.addEventListener('click', e => { e.stopPropagation(); t2RemoveStep(i); });

  row1.appendChild(handle);
  row1.appendChild(icon);
  row1.appendChild(titleInp);
  row1.appendChild(delBtn);

  const descInp = document.createElement('textarea');
  descInp.className = 't2-section-desc-input';
  descInp.placeholder = '부가 설명 (선택)';
  descInp.value = step.sectionDesc || '';
  descInp.rows = 1;
  descInp.addEventListener('input', e => {
    step.sectionDesc = e.target.value;
    e.target.style.height = 'auto';
    e.target.style.height = e.target.scrollHeight + 'px';
  });
  descInp.addEventListener('click', e => e.stopPropagation());
  descInp.setAttribute('draggable', 'false');
  if(step.sectionDesc) { setTimeout(() => { descInp.style.height = descInp.scrollHeight + 'px'; }, 0); }

  card.appendChild(row1);
  card.appendChild(descInp);
  node.appendChild(conn);
  node.appendChild(card);
  return node;
}

function t2BuildEmptySlotNode(step, i, flow) {
  const node = document.createElement('div');
  node.className = 't2-flow-node';
  node.id = 't2-node-' + i;

  const conn = document.createElement('div');
  conn.className = 't2-node-connector';
  conn.innerHTML = `<div class="t2-conn-dot" style="border-color:var(--border2);background:transparent;border-style:dashed"></div>

  card.id = 't2-card-' + i;

  // ── row1: 핸들 / STEP / 직접작성배지 / 시그널지정 / 삭제
  const row1 = document.createElement('div');
  row1.className = 't2-slot-row1';

  const handle = document.createElement('span');
  handle.className = 't2-drag-handle';
  handle.title = '드래그하여 순서 변경';

  titleInp.value = step.slotTitle || '';
  titleInp.addEventListener('input', e => {

    step.slotCustom = !!(e.target.value || step.slotDesc);
    customBadge.style.display = step.slotCustom ? '' : 'none';

  titleInp.addEventListener('click', e => e.stopPropagation());

  const descInp = document.createElement('textarea');

    e.target.style.height = 'auto';
    e.target.style.height = Math.min(e.target.scrollHeight, 54) + 'px';
  });
  descInp.addEventListener('click', e => e.stopPropagation());
  descInp.setAttribute('draggable', 'false');
  if(step.slotDesc) { setTimeout(() => { descInp.style.height = Math.min(descInp.scrollHeight, 54) + 'px'; }, 0); }

  editRow.appendChild(titleInp);
  editRow.appendChild(descInp);

  card.appendChild(row1);
  card.appendChild(editRow);
  node.appendChild(conn);
  node.appendChild(card);
  return node;
}

/* ── 시그널 지정 드롭다운 ── */
let t2AssignMenuOpen = null;
function t2OpenAssignMenu(slotIdx, card) {
  // 기존 메뉴 닫기
  document.querySelectorAll('.t2-assign-dropdown').forEach(el => el.remove());
  if(t2AssignMenuOpen === slotIdx) { t2AssignMenuOpen = null; return; }
  t2AssignMenuOpen = slotIdx;

  const dropdown = document.createElement('div');
  dropdown.className = 't2-assign-dropdown';

  const lib = t2SyncedSC();
  lib.forEach(entry => {
    const item = document.createElement('div');
    item.className = 't2-assign-item';
    item.innerHTML = `<span class="t2-assign-item-abbr">${entry.abbr||'-'}</span><span>${entry.name}</span>`;
    item.addEventListener('click', () => {
      const sc = t2GetScenario();
      if(sc && sc.flow[slotIdx]) {
        sc.flow[slotIdx] = { ...entry, type:'signal', memo: sc.flow[slotIdx].memo||'', flagged: sc.flow[slotIdx].flagged||false };
      }
      dropdown.remove();
      t2AssignMenuOpen = null;
      t2RenderFlow();
      t2SelectFlowStep(slotIdx);
    });
    dropdown.appendChild(item);
  });

  card.style.position = 'relative';
  card.appendChild(dropdown);

  // 외부 클릭 시 닫기
  setTimeout(() => {
    document.addEventListener('click', function closeMenu(e) {
      if(!dropdown.contains(e.target)) {
        dropdown.remove();
        t2AssignMenuOpen = null;
        document.removeEventListener('click', closeMenu);
      }
    });
  }, 0);
}

/* ══════════════════════════════════════════
   EXPORT ALL SCENARIOS
══════════════════════════════════════════ */
function t2ExportAll() {
  if(!t2Scenarios.length) { alert('시나리오가 없습니다.'); return; }
  const now = new Date().toLocaleString('ko-KR');
  let lines = [
    'innk Scenario Flow — 전체 내보내기',
    `생성일시: ${now}`,
    `총 시나리오: ${t2Scenarios.length}개`,
    '',
    '═'.repeat(50),
  ];
  t2Scenarios.forEach((sc, si) => {
    lines.push('');
    lines.push(`■ 시나리오 ${si+1}. ${sc.title}`);
    lines.push(`  스텝: ${sc.flow.length}개 | 이슈: ${sc.flow.filter(s=>s.flagged).length}개`);
    lines.push('─'.repeat(48));
    let stepNum = 0;
    sc.flow.forEach((step, i) => {
      if(step.type === 'section') {
        lines.push('');
        lines.push(`  ┌─ § ${step.sectionTitle||'(섹션)'}`);
        if(step.sectionDesc) lines.push(`  │  ${step.sectionDesc}`);
        return;
      }
      stepNum++;
      let prefix, displayName;
      if(step.type === 'empty') {
        prefix = step.slotCustom ? '(직접 작성)' : '(미지정)';
        displayName = step.slotTitle || '(빈 슬롯)';
      } else {
        prefix = `[${step.abbr||'-'}]`;
        displayName = step.name;
      }
      lines.push(`  STEP ${stepNum}. ${displayName} ${prefix}`);
      if(step.type === 'empty' && step.slotDesc) lines.push(`    설명: ${step.slotDesc}`);
      if(step.type !== 'empty') {
        const motName = (typeof MOTION_OPTS !== 'undefined') ? (MOTION_OPTS.find(m=>m.id===step.motionId)?.name||step.motionId) : step.motionId;
        const motStatus = step.motionOff ? ' [OFF]' : '';
        const sndStatus = step.soundOff ? ' [OFF]' : '';
        lines.push(`    모션: ${motName}${motStatus} | 소리: ${step.soundId||'none'}${sndStatus}`);
        if(step.action) lines.push(`    액션: ${step.action}`);
      }
      if(step.flagged) lines.push(`    ⚑ 이슈 표시됨`);
      if(step.memo) lines.push(`    메모: ${step.memo}`);
    });
    lines.push('');
  });

  const blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `innk_all_scenarios_${Date.now()}.txt`; a.click();
  URL.revokeObjectURL(url);
}

/* ── 전체 내보내기 카운트 업데이트 ── */
function t2UpdateExportCount() {
  const el = document.getElementById('t2-eaf-count');
  if(!el) return;
  const total = t2Scenarios.length;
  const flagged = t2Scenarios.reduce((acc, sc) => acc + sc.flow.filter(s => s.flagged).length, 0);
  el.textContent = total + '개' + (flagged ? ' · ⚑' + flagged : '');
  el.style.display = total ? '' : 'none';
}

/* ── 효과 온오프 헬퍼 ── */
function t2ToggleMotion(i) {
  const sc = t2GetScenario();
  if(!sc || !sc.flow[i]) return;
  sc.flow[i].motionOff = !sc.flow[i].motionOff;
  t2StartT = null;
  t2RenderFlow();
  t2RenderDetail();
}
function t2ToggleSound(i) {
  const sc = t2GetScenario();
  if(!sc || !sc.flow[i]) return;
  sc.flow[i].soundOff = !sc.flow[i].soundOff;
  t2RenderFlow();
  t2RenderDetail();
}

/* ── 시나리오 복사 ── */
function t2CopyScenario(idx) {
  const src = t2Scenarios[idx];
  if(!src) return;
  // flow 딥카피 - 각 step의 모든 속성 보존
  const copiedFlow = src.flow.map(step => ({ ...step }));
  const copy = {
    id: 't2sc_' + Date.now(),
    title: src.title + ' (복사)',
    flow: copiedFlow,
  };
  // 원본 바로 다음에 삽입
  t2Scenarios.splice(idx + 1, 0, copy);
  t2CurScIdx = idx + 1;
  t2CurFlowIdx = copy.flow.length > 0 ? 0 : -1;
  t2ShowFlowArea();
  t2RenderScTabs();
  t2RenderFlow();
  t2RenderDetail();
  t2UpdateTitleInput();
  t2UpdateExportCount();
  t2StartPreviewLoop();
}

function t2OpenMockup() {
  const sc = t2GetScenario();
  if(!sc) { alert('시나리오가 없습니다.'); return; }

  const flowWithMs = sc.flow.map(step => {
    const ms = SPEED_OPTS.find(s => s.id === step.speedId)?.ms || 800;
    return { ...step, _ms: ms };
  });

  // 데이터를 JSON으로 직렬화 후 Base64 인코딩
  const payload = JSON.stringify({ flow: flowWithMs, title: sc.title });
  const payloadB64 = btoa(unescape(encodeURIComponent(payload)));

  // 목업 HTML을 base64 디코딩 → 데이터 인라인 주입 → 새 Blob 생성
  const bin = atob(_MK_B64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  let html = new TextDecoder('utf-8').decode(bytes);

  // 
  // </body> 직전에 INIT_DATA 스크립트 삽입
  const initScript = `<scr` + `ipt>
(function(){
  var raw = decodeURIComponent(escape(atob("${payloadB64}")));
  var d = JSON.parse(raw);
  window.__INNK_DATA__ = d;
  // DOM 준비 후 즉시 초기화
  function init(){
    if(typeof initFromData === 'function') initFromData(d);
    else window.addEventListener('DOMContentLoaded', function(){ if(typeof initFromData==='function') initFromData(d); });
  }
  if(document.readyState !== 'loading') init();
  else document.addEventListener('DOMContentLoaded', init);
})();
</scr` + `ipt>`;

  html = html.replace('</body>', initScript + '\n</body>');

  const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);

  const win = window.open(url, 'innk_mockup_' + Date.now(),
    'width=1100,height=780,menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=no'
  );
  if(!win) { alert('팝업이 차단됐습니다.\n브라우저 주소창 오른쪽의 팝업 허용 버튼을 클릭해주세요.'); }
}


/* ══════════════════════════════════════════
   SIGNAL SIMULATOR 설정 내보내기 / 불러오기
══════════════════════════════════════════ */

function showToast(msg, duration) {
  const el = document.getElementById('import-toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration || 2200);
}

/* ── 설정 내보내기 ── */
function exportSimSettings() {
  const data = {
    version: '1.0',
    exportedAt: new Date().toISOString(),
    type: 'innk-sim-settings',
    overrides: overrides.map((ov, i) => ({
      scIdx: i,
      name: SC[i]?.name || '',
      status: ov.status,
      steps: ov.steps.map(s => ({
        abbr:     s.abbr,
        motionId: s.motionId,
        speedId:  s.speedId,
        soundId:  s.soundId,
        note:     s.note || '',
      })),
    })),
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `innk_sim_settings_${Date.now()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('설정을 내보냈습니다');
}

function triggerImportSim() {
  document.getElementById('import-sim-input')?.click();
}

/* ── 설정 불러오기 ── */
function importSimSettings(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(data.type !== 'innk-sim-settings') {
        showToast('올바른 설정 파일이 아닙니다'); return;
      }
      let restored = 0;
      data.overrides.forEach(item => {
        const i = item.scIdx;
        if(i >= 0 && i < overrides.length && item.steps?.length) {
          overrides[i].status = item.status || overrides[i].status;
          item.steps.forEach((s, si) => {
            if(overrides[i].steps[si]) {
              if(s.abbr     !== undefined) overrides[i].steps[si].abbr     = s.abbr;
              if(s.motionId !== undefined) overrides[i].steps[si].motionId = s.motionId;
              if(s.speedId  !== undefined) overrides[i].steps[si].speedId  = s.speedId;
              if(s.soundId  !== undefined) overrides[i].steps[si].soundId  = s.soundId;
              if(s.note     !== undefined) overrides[i].steps[si].note     = s.note;
            }
          });
          restored++;
        }
      });
      // 탭1 UI 갱신
      buildFilterBar();
      buildSidebar();
      buildRpanel();
      updateProgressSummary();
      updateDeviceScreen();
      startAnim();
      // 탭2 라이브러리도 갱신
      t2BuildLib();
      showToast(`설정 불러오기 완료 (${restored}개 시그널 갱신)`);
    } catch(err) {
      showToast('파일을 읽을 수 없습니다: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

/* ══════════════════════════════════════════
   시나리오 TXT 불러오기
══════════════════════════════════════════ */

function triggerImportScenario() {
  document.getElementById('import-sc-input')?.click();
}

function importScenarioFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const sc = parseScenarioTxt(e.target.result, file.name);
      if(!sc) { showToast('시나리오 파일 형식을 인식할 수 없습니다'); return; }
      // 새 시나리오로 추가
      t2Scenarios.push(sc);
      t2CurScIdx = t2Scenarios.length - 1;
      t2CurFlowIdx = sc.flow.length > 0 ? 0 : -1;
      t2ShowFlowArea();
      t2RenderScTabs();
      t2RenderFlow();
      t2RenderDetail();
      t2UpdateTitleInput();
      t2UpdateExportCount();
      t2StartPreviewLoop();
      showToast(`"${sc.title}" 불러오기 완료 (${sc.flow.filter(s=>s.type!=='section').length}개 스텝)`);
    } catch(err) {
      showToast('파싱 오류: ' + err.message);
    }
    input.value = '';
  };
  reader.readAsText(file);
}

/* ── txt 파서 ── */
function parseScenarioTxt(txt, filename) {
  const lines = txt.split('\n');

  // 헤더 파싱: "innk Scenario Flow — 제목"
  const headerLine = lines[0] || '';
  const titleMatch = headerLine.match(/innk Scenario Flow\s*[—\-–]\s*(.+)/);
  const title = titleMatch ? titleMatch[1].trim()
    : (filename || '불러온 시나리오').replace(/\.txt$/, '');

  // 모션 이름 → motionId 역매핑
  const motionNameMap = {};
  if(typeof MOTION_OPTS !== 'undefined') {
    MOTION_OPTS.forEach(m => { motionNameMap[m.name] = m.id; });
  }
  // 추가 별칭
  Object.assign(motionNameMap, {
    '페이드인': 'fadein', '페이드아웃': 'fadeout',
    '정지 표시': 'static', '깜빡임': 'blink',
    '2회 깜빡임': 'blink2', '3회 깜빡임': 'blink3',
    '2회 깜빡임 → 정지': 'blink2', '3회 깜빡임 → 정지': 'blink3',
    '좌→우 스윕': 'sweep_lr', '우→좌 스윕': 'sweep_rl',
    '펄스 글로우': 'pulse_glow', '확장': 'expand',
  });

  // speedId 기본값 추론 (motionId 기반)
  const motionSpeedMap = {
    fadein: 'vslow', fadeout: 'vslow', static: 'vslow',
    blink: 'slow', blink2: 'mid', blink3: 'fast',
    sweep_lr: 'sweep', sweep_rl: 'sweep',
    pulse_glow: 'slow', expand: 'mid',
  };

  // SC 이름으로 _scIdx 찾기
  function findScIdx(name, abbr) {
    if(typeof SC === 'undefined') return -1;
    // 정확히 일치
    let idx = SC.findIndex(s => s.name === name);
    if(idx >= 0) return idx;
    // abbr로 fallback
    if(abbr) {
      idx = SC.findIndex(s => {
        const ov = overrides[SC.indexOf(s)];
        return ov?.steps[0]?.abbr === abbr;
      });
      if(idx >= 0) return idx;
    }
    return -1;
  }

  const flow = [];
  let i = 0;
  while(i < lines.length) {
    const line = lines[i];

    // 섹션 구분자: "  ┌─ § 섹션명"
    const secMatch = line.match(/[┌├]─\s*§\s*(.+)/);
    if(secMatch) {
      const sectionTitle = secMatch[1].trim();
      let sectionDesc = '';
      if(lines[i+1] && lines[i+1].match(/[│]\s+(.+)/)) {
        sectionDesc = lines[i+1].match(/[│]\s+(.+)/)[1];
        i++;
      }
      flow.push({ type:'section', sectionTitle, sectionDesc, name:'[섹션]', abbr:'', memo:'', flagged:false, _scIdx:-2 });
      i++; continue;
    }

    // 일반 스텝: "STEP N. 이름 [ABBR]"
    const stepMatch = line.match(/^STEP\s+\d+\.\s+(.+?)\s+\[([^\]]+)\]/);
    if(stepMatch) {
      const name = stepMatch[1].trim();
      const abbr = stepMatch[2].trim();

      // 다음 줄들 파싱
      let motionId = 'static', speedId = 'vslow', soundId = 'none';
      let desc = '', action = '', memo = '', flagged = false;
      let type = 'normal';

      while(i + 1 < lines.length) {
        const next = lines[i + 1];
        // 유형/모션/소리 줄
        const propMatch = next.match(/^\s+유형:\s*(\S+)\s*\|\s*모션:\s*([^|]+?)\s*\|\s*소리:\s*(\S+)/);
        if(propMatch) {
          type = propMatch[1].trim();
          const motName = propMatch[2].trim();
          motionId = motionNameMap[motName] || 'static';
          soundId  = propMatch[3].trim();
          speedId  = motionSpeedMap[motionId] || 'mid';
          i++;
          // 설명 줄
          if(lines[i+1] && lines[i+1].match(/^\s+설명:/)) {
            desc = lines[i+1].replace(/^\s+설명:\s*/, '').trim();
            i++;
          }
          // 액션 줄
          if(lines[i+1] && lines[i+1].match(/^\s+액션:/)) {
            action = lines[i+1].replace(/^\s+액션:\s*/, '').trim();
            i++;
          }
          // 메모 줄
          if(lines[i+1] && lines[i+1].match(/^\s+메모:/)) {
            memo = lines[i+1].replace(/^\s+메모:\s*/, '').trim();
            i++;
          }
          // 이슈 플래그
          if(lines[i+1] && lines[i+1].includes('⚑')) {
            flagged = true; i++;
          }
          break;
        }
        // motionOff/soundOff 표시
        if(next.match(/모션.*OFF/)) { /* motionOff 처리 */ }
        break;
      }

      const scIdx = findScIdx(name, abbr);
      // SC에서 찾으면 해당 signal 항목으로, 못 찾으면 custom empty 슬롯으로
      if(scIdx >= 0) {
        const lib = t2SyncedSC();
        const entry = lib.find(s => s._scIdx === scIdx);
        if(entry) {
          flow.push({ ...entry, type: type || entry.type,
            motionId, soundId, speedId, desc, action, memo, flagged,
            motionOff: false, soundOff: false });
        } else {
          flow.push({ type:'empty', name, abbr, slotTitle:name, slotDesc:desc, slotCustom:true, memo, flagged, _scIdx:-1 });
        }
      } else {
        // SC에 없으면 직접 작성 empty 슬롯
        flow.push({ type:'empty', name, abbr, slotTitle:name, slotDesc:desc, slotCustom:true, memo, flagged, _scIdx:-1 });
      }
      i++; continue;
    }

    i++;
  }

  if(!flow.length) return null;

  return {
    id: 't2sc_' + Date.now(),
    title,
    flow,
  };
}
