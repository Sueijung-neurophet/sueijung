/* ── File load ── */
let spLib=[], spLibIdx=[], spLoaded=false;
document.getElementById('dp-sp-load-btn').addEventListener('click',()=>document.getElementById('sp-file-input').click());
document.getElementById('sp-file-input').addEventListener('change',function(){
  const file=this.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.type!=='innk-sim-settings'){alert('innk-sim-settings 타입의 JSON만 불러올 수 있습니다.');return;}
      spLib=data.overrides||[]; spLibIdx=[];
      spLib.forEach(o=>{spLibIdx[o.scIdx]=o;});
      spLoaded=true;
      const btn=document.getElementById('dp-sp-load-btn');
      btn.textContent='✓ '+file.name.slice(0,18); btn.classList.add('loaded');
      document.getElementById('dp-sp-file-lbl').textContent=spLib.length+'개 신호';
      document.getElementById('dp-sp-file-lbl').style.color='#16a34a';
      document.getElementById('dp-sp-hint').innerHTML='노드를 클릭하면<br>LED 신호를 확인합니다';
      if(spCurScId) dpSpShow(spCurScId,'','');
    }catch(err){alert('파일 읽기 오류: '+err.message);}
    this.value='';
  };
  reader.readAsText(file);
});

let spCurScId=null, spSigs=[], spIdx=0, spRaf=null, spT0=null;
let spAutoPlay=false, spAutoTimer=null;
const dpSpCanvasEl=document.getElementById('dp-sp-canvas');
const dpSpCtx=dpSpCanvasEl?.getContext('2d');

/* ── 진입점: 노드 클릭 → 신호 패널 업데이트 ── */
function dpSpShow(scId, label, sec){
  spCurScId=scId; spAutoPlay=false;
  dp.classList.add('open');
  /* 탭 전환 불필요 - 2단 고정 레이아웃 */
  if(!spLoaded){dpSpSetHint('signals.json을 먼저 불러오세요');return;}
  const idxList=NODE_SC_MAP[scId]||[];
  if(!idxList.length){dpSpSetHint('이 노드에 매핑된\nLED 신호가 없습니다');dpSpClearChips();return;}
  // SC 배열에서 카드 type 읽어 fallback으로 주입 (signals.json 없어도 오류=붉은색)
  const _scType=(SC.find(s=>s.id===scId)||{}).type||'normal';
  spSigs=idxList.map(i=>{const ov=spLibIdx[i];return ov?{...ov,type:ov.type||_scType,_ok:true}:{scIdx:i,name:'미매핑 신호 ('+i+')',abbr:'N/A',steps:[],type:_scType,_ok:false};});
  spIdx=0; dpSpBuildChips(); dpSpPlay(0);
}

function dpSpSetHint(msg){
  dpSpStop();
  const h=document.getElementById('dp-sp-hint');
  h.innerHTML=msg.replace(/\n/g,'<br>'); h.classList.add('show');
  document.getElementById('dp-sp-device').classList.remove('show');
  document.getElementById('dp-sp-nav').classList.remove('show');
}
function dpSpClearChips(){
  document.getElementById('dp-sp-chips').innerHTML='';
  document.getElementById('dp-sp-chips-lbl').style.display='none';
}


function dpSpRefreshAutoBtn(){
  const btn=document.getElementById('dp-sp-auto');
  if(!btn)return;
  if(spSigs.length<=1){ btn.style.display='none'; return; }
  btn.style.display='';
  btn.textContent=spAutoPlay?'■':'▶';
  btn.title=spAutoPlay?'순차 재생 중지':'순차 재생';
  btn.classList.toggle('active', spAutoPlay);
}

function dpSpBuildChips(){
  const list=document.getElementById('dp-sp-chips'), lbl=document.getElementById('dp-sp-chips-lbl');
  list.innerHTML=''; if(!spSigs.length){lbl.style.display='none';return;}
  lbl.style.display='';
  spSigs.forEach((sig,i)=>{
    const rawAbbr=(sig.steps?.[0]?.abbr)||sig.abbr||'';
    const abbr=rawAbbr.trim()||'-';
    const tc={err:'#dc2626',warn:'#e08c00',normal:'#16a34a'}[sig.type||'normal']||'#16a34a';
    const sndId=sig.steps?.[0]?.soundId||'none';
    const chip=document.createElement('div');
    chip.className='dp-sp-chip'+(i===spIdx?' active':'');
    chip.innerHTML=`<span class="dp-sp-chip-dot" style="background:${tc}"></span><span class="dp-sp-chip-abbr">${abbr}</span><span class="dp-sp-chip-name">${sig.name||''}</span>`+(sndId!=='none'?`<span class="dp-sp-chip-snd" title="소리 미리듣기">♪</span>`:'');
    chip.addEventListener('click',()=>{spAutoPlay=false;dpSpRefreshAutoBtn();dpSpPlay(i);});
    if(sndId!=='none') chip.querySelector('.dp-sp-chip-snd')?.addEventListener('click',ev=>{ev.stopPropagation();spPlaySnd(sndId);});
    list.appendChild(chip);
  });
  dpSpRefreshAutoBtn(); // 칩 렌더 후 버튼 상태 갱신
}
function dpSpRefreshActive(){
  document.querySelectorAll('.dp-sp-chip').forEach((c,i)=>{
    c.classList.toggle('active',i===spIdx);
    c.classList.remove('auto-playing');
    c.style.removeProperty('--chip-dur');
  });
  if(spAutoPlay && spSigs.length>1){
    const chip=document.querySelectorAll('.dp-sp-chip')[spIdx];
    if(chip){
      const sig=spSigs[spIdx];
      const dur=(SP_AUTO_MS[sig?.scIdx??-1]||3000)/1000;
      chip.style.setProperty('--chip-dur', dur+'s');
      // 강제 리플로우 후 애니메이션 시작
      void chip.offsetWidth;
      chip.classList.add('auto-playing');
    }
  }
  dpSpRefreshAutoBtn();
}

function dpSpPlay(i){
  dpSpStop();
  spIdx=Math.max(0,Math.min(i,spSigs.length-1));
  dpSpRefreshActive();
  const sig=spSigs[spIdx];
  if(!sig._ok){dpSpSetHint('SC['+sig.scIdx+'] 신호를\n파일에서 찾을 수 없습니다');return;}
  const step=sig.steps?.[0]||{};
  const rawAbbr=(step.abbr||sig.abbr||'').trim();
  const abbrDisplay=rawAbbr||'-';  // 칩 표시용 (빈 경우 -)
  const motionId=step.motionId||'static';
  const speedId=step.speedId||'slow';
  const soundId=step.soundId||'none';
  const type=sig.type||'normal';
  document.getElementById('dp-sp-hint').classList.remove('show');
  document.getElementById('dp-sp-device').classList.add('show');
  const nav=document.getElementById('dp-sp-nav');
  if(spSigs.length>1){nav.classList.add('show');document.getElementById('dp-sp-nav-info').textContent=(spIdx+1)+' / '+spSigs.length;}
  else nav.classList.remove('show');
  document.getElementById('dp-sp-motion-lbl').textContent=motionId+' · '+speedId;
  spPlaySnd(soundId);
  spT0=null;
  const _scIdx=sig.scIdx??-1;
  // 자동 전진: 복수 신호일 때 SP_AUTO_MS 후 다음 신호로
  if(spAutoTimer){clearTimeout(spAutoTimer);spAutoTimer=null;}
  if(spSigs.length>1 && spAutoPlay){
    const autoMs=(SP_AUTO_MS[_scIdx])||3000;
    spAutoTimer=setTimeout(()=>{
      if(spIdx<spSigs.length-1) dpSpPlay(spIdx+1);
      else { spAutoPlay=false; dpSpRefreshAutoBtn(); } // 마지막 신호: 멈춤
    }, autoMs);
  }
  (function loop(ts){if(spT0===null)spT0=ts;dpSpDraw(ts-spT0,rawAbbr,motionId,speedId,type,_scIdx);spRaf=requestAnimationFrame(loop);})(performance.now());
}
function dpSpStop(){if(spRaf){cancelAnimationFrame(spRaf);spRaf=null;} if(spAutoTimer){clearTimeout(spAutoTimer);spAutoTimer=null;}}

document.getElementById('dp-sp-prev').addEventListener('click',()=>{spAutoPlay=false;dpSpRefreshAutoBtn();dpSpPlay(spIdx-1);});
document.getElementById('dp-sp-next').addEventListener('click',()=>{spAutoPlay=false;dpSpRefreshAutoBtn();dpSpPlay(spIdx+1);});
document.getElementById('dp-sp-auto')?.addEventListener('click',()=>{
  spAutoPlay=!spAutoPlay;
  dpSpRefreshAutoBtn();
  if(spAutoPlay){
    // 처음부터 순차 재생
    dpSpPlay(0);
  } else {
    dpSpStop();
  }
});

/* ── Renderer ── */
function dpSpDotOn(type,a){
  if(type==='err')  return `rgba(224,74,74,${a})`;
  if(type==='warn') return `rgba(240,160,64,${a})`;
  return `rgba(0,207,189,${a})`;
}
const SP_OFF='#1c3d38';

/* ── customRender: scIdx별 시뮬레이터 1:1 이식 ── */
function dpSpCustomRender(scIdx,t){
  const cols=SPC,rows=SPR;
  // scIdx 2: USB 연결 이펙트 - fadein + connect sound (abbr 없음 → 전체 도트 fade in)
  // scIdx 4: USB 해제 이펙트 - fadeout + single sound (abbr 없음 → 전체 도트 fade out)
  if(scIdx===2){const alpha=Math.min(1,t/1250);const pixels=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)pixels.push([r,c]);return{pixels,alpha};}
  if(scIdx===4){const alpha=Math.max(0.02,1-t/1000);const pixels=[];for(let r=0;r<rows;r++)for(let c=0;c<cols;c++)pixels.push([r,c]);return{pixels,alpha};}
  const altRender=(str1,str2)=>{
    const INTERVAL=1500,FADE=200,phase=t%(INTERVAL*2);
    let alpha,str,lp;
    if(phase<INTERVAL){str=str1;lp=phase;}
    else{str=str2;lp=phase-INTERVAL;}
    if(lp<FADE)alpha=lp/FADE;
    else if(lp>INTERVAL-FADE)alpha=1-(lp-(INTERVAL-FADE))/FADE;
    else alpha=1;
    const tw=spTW(str),dc=Math.max(0,Math.floor((cols-tw)/2));
    return {pixels:spPx(str,dc,0),alpha};
  };
  if(scIdx===16) return altRender('tDCS','RDY');
  if(scIdx===17) return altRender('tACS','RDY');
  if(scIdx===18) return altRender('SHAM','RDY');
  if(scIdx===19) return altRender('tPCS','RDY');
  if(scIdx===20) return altRender('tRNS','RDY');
  if(scIdx===21) return altRender('AM','RDY');
  if(scIdx===24){
    const TOTAL_MS=20*60000,remainMs=TOTAL_MS-(t%TOTAL_MS);
    const remainMin=Math.max(1,Math.ceil(remainMs/60000));
    const showStr=remainMs>60000?String(remainMin):'<1';
    const tw=spTW(showStr),dc=Math.max(0,Math.floor((cols-tw)/2));
    const numPx=spPx(showStr,dc,0);
    const secInMin=(remainMs%60000)/1000;
    const colsUse=[0,1,cols-2,cols-1];
    const cells=[];
    colsUse.forEach(c=>{for(let r=0;r<rows;r++)cells.push([r,c]);});
    cells.sort((a,b)=>(b[0]-a[0])||(a[1]-b[1]));
    const lit=Math.round(cells.length*(secInMin/60));
    const occ=new Set(numPx.map(([r,c])=>r+','+c));
    return {pixels:[...numPx,...cells.slice(0,lit).filter(([r,c])=>!occ.has(r+','+c))],alpha:1};
  }
  if(scIdx===6){
    const pct=Math.floor(85+((t%15000)/15000)*15);
    const str=String(pct)+'%';
    const tw=spTW(str),dc=Math.max(0,Math.floor((cols-tw)/2));
    return {pixels:spPx(str,dc,0),alpha:1};
  }
  if(scIdx===5){
    const str='85%',tw=spTW(str),dc=Math.max(0,Math.floor((cols-tw)/2));
    return {pixels:spPx(str,dc,0),alpha:1};
  }
  if(scIdx===9){
    const alpha=((t%333)/333)<0.5?1:0.05;
    const str='NP',tw=spTW(str),dc=Math.max(0,Math.floor((cols-tw)/2));
    return {pixels:spPx(str,dc,0),alpha};
  }
  return null;
}

function dpSpDraw(t,abbr,motionId,speedId,type='normal',scIdx=-1){
  if(!dpSpCtx)return;
  const ms={vfast:250,fast:333,mid:667,slow:1000,vslow:1250,sweep:2000}[speedId]||800;
  const cols=SPC,rows=SPR,dot=SPD,gap=SPG;
  const custom=dpSpCustomRender(scIdx,t);
  if(custom){
    const aSet=new Set(custom.pixels.map(([r,c])=>r+','+c));
    dpSpCtx.clearRect(0,0,SP_CW_PX,SP_CH_PX);
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
      dpSpCtx.fillStyle=aSet.has(r+','+c)?dpSpDotOn(type,custom.alpha):SP_OFF;
      dpSpCtx.beginPath();dpSpCtx.arc(c*(dot+gap)+dot/2,r*(dot+gap)+dot/2,dot/2,0,Math.PI*2);dpSpCtx.fill();
    }
    return;
  }
  const tw=spTW(abbr),dc=Math.max(0,Math.floor((cols-tw)/2));
  // abbr 빈 문자열 + 자체 픽셀 없는 모션 → LED에 아무것도 표시 안 함
  const selfPixelMotion=motionId==='sweep_lr'||motionId==='sweep_rl'||motionId==='expand';
  const onSet=(!abbr&&!selfPixelMotion)?new Set():new Set(spPx(abbr,dc,0).map(([r,c])=>r+','+c));
  let pixels=null,alpha=1;
  if(motionId==='fadein')       alpha=Math.min(1,t/700);
  else if(motionId==='fadeout') alpha=Math.max(0.02,1-t/700);
  else if(motionId==='blink')   alpha=((t%ms)/ms)<0.5?1:0.05;
  else if(motionId==='blink3')  {alpha=1;if(t<ms*3)alpha=((t%ms)<(ms/2))?1:0.05;}
  else if(motionId==='blink2')  {alpha=1;if(t<ms*2)alpha=((t%ms)<(ms/2))?1:0.05;}
  else if(motionId==='pulse_glow'){alpha=0.15+0.85*Math.abs(Math.sin(((t%ms)/ms)*Math.PI));}
  else if(motionId==='sweep_lr'||motionId==='sweep_rl'){
    const phase=(t%ms)/ms;
    const head=motionId==='sweep_lr'?Math.floor(phase*(cols+6))-3:Math.floor((1-phase)*(cols+6))-3;
    pixels=[];
    for(let c=0;c<cols;c++){const d=c-head;if(d>=0&&d<4){const mid=Math.floor(rows/2);pixels.push([mid,c]);if(rows>=7){pixels.push([mid-1,c]);pixels.push([mid+1,c]);}}}
    alpha=1;
  } else if(motionId==='expand'){
    const breath=0.5+0.5*Math.sin((t/(ms||1400))*Math.PI*2);
    const midR=(rows-1)/2,midC=(cols-1)/2,radius=1+breath*Math.max(midC,3.5);
    pixels=[];
    for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){const d=Math.sqrt((r-midR)**2+((c-midC)*0.55)**2);if(d<=radius&&d>=radius-1.4)pixels.push([r,c]);}
    alpha=0.35+0.65*breath;
  }
  dpSpCtx.clearRect(0,0,SP_CW_PX,SP_CH_PX);
  const src=pixels!==null?new Set(pixels.map(([r,c])=>r+','+c)):onSet;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    dpSpCtx.fillStyle=src.has(r+','+c)?dpSpDotOn(type,alpha):SP_OFF;
    dpSpCtx.beginPath();dpSpCtx.arc(c*(dot+gap)+dot/2,r*(dot+gap)+dot/2,dot/2,0,Math.PI*2);dpSpCtx.fill();
  }
}
function dpSpDrawIdle(){
  if(!dpSpCtx)return;
  dpSpCtx.clearRect(0,0,SP_CW_PX,SP_CH_PX);
  for(let r=0;r<SPR;r++) for(let c=0;c<SPC;c++){
    dpSpCtx.fillStyle='rgba(0,207,189,0.05)';dpSpCtx.beginPath();dpSpCtx.arc(c*(SPD+SPG)+SPD/2,r*(SPD+SPG)+SPD/2,SPD/2,0,Math.PI*2);dpSpCtx.fill();
  }
}

if(dpSpCanvasEl){
  dpSpCanvasEl.width=SP_CW_PX; dpSpCanvasEl.height=SP_CH_PX;
  dpSpCanvasEl.style.width=SP_CW_PX+'px'; dpSpCanvasEl.style.height=SP_CH_PX+'px';
  dpSpDrawIdle();
}

// UX 필드 실시간 저장
["dp-ux-confusion","dp-ux-action"].forEach(id=>{
  const el = document.getElementById(id);
  el.addEventListener("input", ()=>{
    // 높이 자동 조정
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
    if(!selNode) return;
    const n = nodes.find(x=>x.id===selNode); if(!n) return;
    if(id==="dp-ux-confusion") n.uxConfusion = el.value;
    if(id==="dp-ux-action")    n.uxAction    = el.value;
  });
});


</script>
