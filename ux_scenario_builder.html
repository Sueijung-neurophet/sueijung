/* ══ BUILD NODE ══ */
const NOTE_MAXLEN=22;
function truncateNote(s){ if(!s)return""; return s.length>NOTE_MAXLEN?escapeHtml(s.slice(0,NOTE_MAXLEN))+"...":escapeHtml(s); }
function escapeHtml(s){ return s.replace(/&/g,"&"+"amp;").replace(/</g,"&"+"lt;").replace(/>/g,"&"+"gt;"); }
function escapeAttr(s){ return s.replace(/&/g,"&"+"amp;").replace(/"/g,"&"+"quot;").replace(/</g,"&"+"lt;").replace(/>/g,"&"+"gt;"); }
function buildNode(node){
  const sc=SC.find(s=>s.id===node.scId);
  const el=document.createElement("div");
  // Pin badge
  function makePeakBadge(peak){
    const existing=el.querySelector(".peak-badge"); if(existing)existing.remove();
    if(!peak)return;
    const badge=document.createElement("div");
    badge.className=`peak-badge ${peak}`; badge.textContent=peak.toUpperCase();
    el.appendChild(badge);
  }
  if(node.isDec){
    el.className="dn"; el.style.cssText=`left:${node.x}px;top:${node.y}px`;
    el.innerHTML=`<svg viewBox="0 0 150 96"><polygon points="75,2 148,48 75,94 2,48" fill="#fdfcfa" stroke="#2c2c2e" stroke-width="1.5"/></svg><div class="dn-content"><div class="dn-lbl">${node.label||"조건 분기"}</div>${node.note?`<div class="dn-note" title="${escapeAttr(node.note)}">${truncateNote(node.note)}</div>`:""}</div><button class="dn-del" data-id="${node.id}"><i class="ti ti-x" style="font-size:9px"></i></button><div class="pt r" data-nid="${node.id}" data-s="r"></div><div class="pt l" data-nid="${node.id}" data-s="l"></div><div class="pt b" data-nid="${node.id}" data-s="b"></div><div class="pt t" data-nid="${node.id}" data-s="t"></div>`;
    if(node.peak){ makePeakBadge(node.peak); el.classList.add("has-peak"); } else { el.classList.remove("has-peak"); }
  } else {
    const clr=TC[node.type]||"#888", isTerm=node.isTerm;
    // Determine terminal variant class
    let termClass="";
    if(isTerm){
      if(node.type==="start") termClass=" t-start";
      else if(node.type==="end"&&node.scId==="END_HELP") termClass=" t-end-err";
      else if(node.type==="end"&&node.scId==="END_USER") termClass=" t-end-user";
      else if(node.type==="end"&&node.scId==="END_ERR") termClass=" t-end-err";
      else if(node.type==="end") termClass=" t-end-ok";
      else termClass=" t-start";
    }
    el.className="fn"+(isTerm?(" term"+termClass):""); el.style.cssText=`left:${node.x}px;top:${node.y}px`;
    el.innerHTML=`${!isTerm?`<div class="fn-dot" style="background:${clr}"></div>`:""}  <div class="fn-body"><div class="fn-title">${node.label}</div>${!isTerm?`<div class="fn-sec">${node.sec||""}</div>`:""}${node.note?`<div class="fn-note"><i class="ti ti-note" style="font-size:12px"></i></div>`:""}</div><button class="fn-del" data-id="${node.id}"><i class="ti ti-x" style="font-size:9px"></i></button><div class="pt r" data-nid="${node.id}" data-s="r"></div><div class="pt l" data-nid="${node.id}" data-s="l"></div><div class="pt b" data-nid="${node.id}" data-s="b"></div><div class="pt t" data-nid="${node.id}" data-s="t"></div>`;
    if(node.peak){ makePeakBadge(node.peak); el.classList.add("has-peak"); } else { el.classList.remove("has-peak"); }
  }
  el.addEventListener("mousedown",ev=>{
    if(ev.target.classList.contains("pt")||ev.target.closest(".fn-del,.dn-del"))return;
    // 스페이스바 누름 상태 → 노드 무시하고 캔버스 패닝
    if(spaceDown){
      dragState={type:"pan",sx:ev.clientX,sy:ev.clientY,ovx:vx,ovy:vy,moved:false};
      wrap.style.cursor=getComputedStyle(document.documentElement).getPropertyValue('--cur-canvas-pan').trim()||"grab";
      ev.preventDefault(); return;
    }
    ev.stopPropagation();
    const isDimNode = nl.classList.contains('scn-mode') && node.ownScn && activeSCN &&
      !(activeSCN.secId===node.ownScn.secId && activeSCN.cardId===node.ownScn.cardId);
    if(isDimNode) return;
    ev.preventDefault();
    const c=s2c(ev.clientX,ev.clientY);
    if(selGroup.has(node.id)&&(selGroup.size>1||selTGroup.size>0)){
      const offs={}, toffs={}, moffs={};
      selGroup.forEach(id=>{ const n=nodes.find(x=>x.id===id); if(n)offs[id]={ox:c.x-n.x,oy:c.y-n.y}; });
      selTGroup.forEach(id=>{ const t=tboxes.find(x=>x.id===id); if(t)toffs[id]={ox:c.x-t.x,oy:c.y-t.y}; });
      mlinks.filter(l=>selGroup.has(l.nid)).forEach(l=>{ const m=memos.find(x=>x.id===l.mid); if(m&&!moffs[m.id])moffs[m.id]={ox:c.x-m.x,oy:c.y-m.y}; });
      dragState={type:"pending-group",offs,toffs,moffs,sx:ev.clientX,sy:ev.clientY,c0:c};
    } else {
      dragState={type:"pending-node",id:node.id,ox:c.x-node.x,oy:c.y-node.y,sx:ev.clientX,sy:ev.clientY};
    }
  });
  el.addEventListener("dblclick",ev=>{
    ev.stopPropagation();
    if(ev.metaKey||ev.ctrlKey){
      selGroup=connectedGroup(node.id);
      selTGroup=new Set(tlinks.filter(l=>selGroup.has(l.nid)).map(l=>l.tid));
      // include linked memos
      const linkedMids=new Set(mlinks.filter(l=>selGroup.has(l.nid)).map(l=>l.mid));
      Object.keys(nEls).forEach(id=>{ nEls[id].classList.toggle("grp-sel",selGroup.has(id)); nEls[id].classList.remove("sel"); });
      Object.keys(tEls).forEach(id=>{ tEls[id].classList.toggle("grp-sel",selTGroup.has(id)); });
      Object.keys(mEls).forEach(id=>{ mEls[id].classList.toggle("sel",linkedMids.has(id)); });
      selNode=null; return;
    }
    // open edit modal
    openEditModal({type:node.isDec?"dec":"node", id:node.id});
  });
  el.addEventListener("click",ev=>{
    if(ev.target.classList.contains("pt")||ev.target.closest(".fn-del,.dn-del"))return;
    if(ev.metaKey||ev.ctrlKey)return;
    ev.stopPropagation();
    // 드래그 후 발생한 click은 패널 열지 않음
    if(_lastNodeMoved){ _lastNodeMoved=false; return; }
    // 그룹 선택 해제
    if(selGroup.size>1||selTGroup.size>0){ deselectAll(); return; }
    setSelNode(node.id);
    // 노드 시나리오 하이라이트
    if(node.ownScn){
      const {secId, cardId} = node.ownScn;
      if(!activeSCN || activeSCN.secId!==secId || activeSCN.cardId!==cardId) highlightSCN(secId, cardId);
    } else {
      node.ownScn = {secId:BLANK_SEC_ID, cardId:BLANK_CARD_ID};
      if(!activeSCN || activeSCN.secId!==BLANK_SEC_ID || activeSCN.cardId!==BLANK_CARD_ID) highlightSCN(BLANK_SEC_ID, BLANK_CARD_ID);
    }
  });
  el.querySelectorAll(".fn-del,.dn-del").forEach(btn=>{
    btn.addEventListener("click",ev=>{
      ev.stopPropagation(); snap();
      const id=btn.dataset.id;
      nodes=nodes.filter(n=>n.id!==id); edges=edges.filter(e=>e.from!==id&&e.to!==id); tlinks=tlinks.filter(l=>l.nid!==id);
      if(nEls[id])nEls[id].remove(); delete nEls[id];
      if(selNode===id){ selNode=null; dp.classList.remove("open"); }
      drawEdges();
    });
  });
  el.querySelectorAll(".pt").forEach(p=>{
    p.addEventListener("mousedown",ev=>{
      ev.stopPropagation(); ev.preventDefault();
      connecting={nid:node.id,side:p.dataset.s};
      p.classList.add("act"); prevp.style.display="";
    });
  });
  nl.appendChild(el); nEls[node.id]=el;

  // 리뷰 모드일 때 배지 표시
  if(rvMode) rvUpdateBadge(node);

  // scn-mode 중 새 노드 추가 시: 활성 시나리오 귀속이면 hi, 아니면 dim
  if(nl.classList.contains('scn-mode') && node.ownScn){
    const owned = activeSCN && node.ownScn.secId===activeSCN.secId && node.ownScn.cardId===activeSCN.cardId;
    if(owned) el.classList.add('scn-hi');
    // owned가 아니면 dim(opacity:0.2)은 CSS가 자동 처리
  }
}

/* ══ DETAIL PANEL ══ */
function renderMarkdown(text){
  if(!text) return '';
  const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const lines = escaped.split('\n');
  let html = '';
  for(let line of lines){
    // heading
    if(/^###\s/.test(line)){ html+=`<div style="font-size:11px;font-weight:700;margin:4px 0 2px;color:#1a1a18">${line.replace(/^###\s/,'')}</div>`; continue; }
    if(/^##\s/.test(line)){ html+=`<div style="font-size:12px;font-weight:700;margin:5px 0 2px;color:#1a1a18">${line.replace(/^##\s/,'')}</div>`; continue; }
    if(/^#\s/.test(line)){ html+=`<div style="font-size:13px;font-weight:700;margin:6px 0 2px;color:#1a1a18">${line.replace(/^#\s/,'')}</div>`; continue; }
    // list
    if(/^[-*]\s/.test(line)){ html+=`<div style="display:flex;gap:5px;padding-left:2px"><span style="margin-top:1px;flex-shrink:0;color:#b5b5b2">·</span><span>${inlineMarkdown(line.replace(/^[-*]\s/,''))}</span></div>`; continue; }
    // numbered list
    if(/^\d+\.\s/.test(line)){ const m=line.match(/^(\d+)\.\s(.*)/); html+=`<div style="display:flex;gap:5px;padding-left:2px"><span style="flex-shrink:0;color:#b5b5b2">${m[1]}.</span><span>${inlineMarkdown(m[2])}</span></div>`; continue; }
    // empty line
    if(line.trim()===''){html+='<div style="height:6px"></div>';continue;}
    html+=`<div>${inlineMarkdown(line)}</div>`;
  }
  return html;
}
function inlineMarkdown(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code style="background:#f0f0ee;border-radius:3px;padding:0 3px;font-family:var(--fnt-mono);font-size:10px">$1</code>')
    .replace(/~~(.+?)~~/g,'<s>$1</s>');
}

function openDetail(node){
  const sc=SC.find(s=>s.id===node.scId);
  if(!sc&&!node.isDec){dp.classList.remove("open");return;}
  const type=sc?sc.type:"decision";
  document.getElementById("dp-bar").style.background=TC[type]||"#1b2850";
  const _tagEl=document.getElementById("dp-tag");
  _tagEl.style.cssText="";
  _tagEl.innerHTML=`<span class="dp-tag-dot" style="background:${TC[type]||'#888'}"></span>${TL[type]||"선택"}`;
  document.getElementById("dp-ttl").textContent=node.label;
  document.getElementById("dp-sec").textContent=node.sec||"";
  const bodyEl = document.getElementById("dp-body");
  const descText = sc ? sc.desc : "";
  const noteText = node.note || "";
  bodyEl.innerHTML = "";
  if(descText){
    const descDiv = document.createElement("div");
    descDiv.className = "dp-body-desc";
    descDiv.textContent = descText;
    bodyEl.appendChild(descDiv);
  }
  if(noteText){
    if(descText){
      const sep = document.createElement("div");
      sep.className = "dp-body-note-sep";
      bodyEl.appendChild(sep);
    }
    const noteDiv = document.createElement("div");
    noteDiv.className = "dp-body-note";
    noteDiv.textContent = noteText;
    bodyEl.appendChild(noteDiv);
  }
  // UX 필드 로드
  const uxFields = document.getElementById("dp-ux-fields");
  const confEl = document.getElementById("dp-ux-confusion");
  const actionEl = document.getElementById("dp-ux-action");
  if(node.isDec){
    uxFields.style.display = "none";
  } else {
    uxFields.style.display = "";
    confEl.value = node.uxConfusion || "";
    actionEl.value = node.uxAction || "";
    // 높이 자동 조정
    [confEl, actionEl].forEach(ta => { ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; });
  }
  dp.classList.add("open");
  // 리뷰 모드일 때 리뷰 섹션 표시
  const dpRv = document.getElementById("dp-review-section");
  dpRv.style.display = rvMode ? "" : "none";
  if(rvMode && !node.isDec) rvLoadDpReview(node);
}

function setSelNode(nodeId){
  // 기존 선택 해제
  document.querySelectorAll(".fn.sel,.dn.sel").forEach(e=>e.classList.remove("sel"));
  selNode = nodeId;

  }
}
function clearSel(){
  deselectAll();

}
function deselectAll(){
  document.querySelectorAll(".fn.sel,.dn.sel,.fn.grp-sel,.dn.grp-sel,.tb-box.grp-sel,.memo-box.sel").forEach(e=>e.classList.remove("sel","grp-sel"));

/* ══ TITLE BOX ══ */
const TB_MAXW=640, TB_MINW=80;
let tbMeasureEl=null;
function tbMeasure(){
  if(!tbMeasureEl){
    tbMeasureEl=document.createElement("span");
    tbMeasureEl.style.cssText="position:absolute;visibility:hidden;white-space:pre;font-family:var(--fnt);font-size:18px;font-weight:700;line-height:1.3;left:-9999px;top:-9999px";
    document.body.appendChild(tbMeasureEl);
  }
  return tbMeasureEl;
}
function buildTbox(t){
  const el=document.createElement("div");
  el.className="tb-box"; el.style.cssText=`left:${t.x}px;top:${t.y}px`;
  const inner=document.createElement("div"); inner.className="tb-inner";
  const ta=document.createElement("textarea"); ta.spellcheck=false; ta.value=t.text; ta.rows=1;
  const del=document.createElement("button"); del.className="tb-del"; del.innerHTML='<i class="ti ti-x" style="font-size:9px"></i>';
  const link=document.createElement("button"); link.className="tb-link"; link.title="노드와 연결"; link.innerHTML='<i class="ti ti-link" style="font-size:9px"></i>';
  inner.appendChild(ta); el.appendChild(del); el.appendChild(link); el.appendChild(inner);
  link.addEventListener("mousedown",ev=>{ ev.stopPropagation(); ev.preventDefault(); tlinking={tid:t.id}; prevp.style.display=""; prevp.setAttribute("stroke","#9b9a96"); });
  function autoH(){ ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px"; }
  function autoW(){
    const m=tbMeasure();
    // 줄바꿈 포함 텍스트 중 가장 긴 줄을 기준으로 너비 측정
    const lines=(ta.value||"").split("\n");
    let maxLineW=0;
    lines.forEach(line=>{ m.textContent=line||" "; maxLineW=Math.max(maxLineW,m.offsetWidth); });
    const hasText=(ta.value||"").length>0;
    const w=hasText?Math.min(TB_MAXW,maxLineW+4):TB_MINW;
    // inner와 textarea 너비를 함께 명시적으로 고정해 밑줄(border-bottom)이 줄었다 늘었다 흔들리는 현상 방지
    inner.style.width=w+"px";
    ta.style.width=w+"px";
  }
  autoH(); autoW();
  let rafPending=false;
  function scheduleFit(){
    if(!rafPending){ rafPending=true; requestAnimationFrame(()=>{ rafPending=false; autoH(); autoW(); }); }
  }
  ta.addEventListener("input",()=>{ t.text=ta.value; autoH(); autoW(); scheduleFit(); });
  ta.addEventListener("compositionupdate",()=>{ autoH(); autoW(); scheduleFit(); });
  ta.addEventListener("compositionend",()=>{ t.text=ta.value; autoH(); autoW(); scheduleFit(); });
  ta.addEventListener("keyup",()=>{ autoH(); autoW(); });
  ta.addEventListener("mousedown",e=>{
    if(document.activeElement!==ta){
      // 비편집 상태에서 누르면 드래그로 처리 (이동), 이미 포커스된 상태면 텍스트 커서 이동 허용
      if(spaceDown){
        dragState={type:"pan",sx:e.clientX,sy:e.clientY,ovx:vx,ovy:vy,moved:false};
        wrap.style.cursor=getComputedStyle(document.documentElement).getPropertyValue('--cur-canvas-pan').trim()||"grab";
        e.preventDefault(); return;
      }
      e.stopPropagation(); e.preventDefault();
      const c=s2c(e.clientX,e.clientY);
      if(selTGroup.has(t.id)&&selGroup.size>0){
        const offs={}, toffs={};
        selGroup.forEach(id=>{ const n=nodes.find(x=>x.id===id); if(n)offs[id]={ox:c.x-n.x,oy:c.y-n.y}; });
        selTGroup.forEach(id=>{ const tb=tboxes.find(x=>x.id===id); if(tb)toffs[id]={ox:c.x-tb.x,oy:c.y-tb.y}; });
        dragState={type:"group",offs,toffs};
      } else {
        dragState={type:"tbox",id:t.id,ox:c.x-t.x,oy:c.y-t.y,sx:e.clientX,sy:e.clientY,moved:false,ta};
      }
    } else {
      e.stopPropagation();
    }
  });
  del.addEventListener("click",e=>{ e.stopPropagation(); snap(); tboxes=tboxes.filter(x=>x.id!==t.id); tlinks=tlinks.filter(l=>l.tid!==t.id); el.remove(); delete tEls[t.id]; drawEdges(); });
  el.addEventListener("mousedown",ev=>{
    if(ev.target===ta||ev.target===del||ev.target.closest(".tb-del"))return;
    ev.stopPropagation(); ev.preventDefault();
    const c=s2c(ev.clientX,ev.clientY);
    if(selTGroup.has(t.id)&&selGroup.size>0){
      const offs={}, toffs={};
      selGroup.forEach(id=>{ const n=nodes.find(x=>x.id===id); if(n)offs[id]={ox:c.x-n.x,oy:c.y-n.y}; });
      selTGroup.forEach(id=>{ const tb=tboxes.find(x=>x.id===id); if(tb)toffs[id]={ox:c.x-tb.x,oy:c.y-tb.y}; });
      dragState={type:"group",offs,toffs};
    } else {
      dragState={type:"tbox",id:t.id,ox:c.x-t.x,oy:c.y-t.y};
    }
  });
  nl.appendChild(el); tEls[t.id]=el;
}

/* ══ MEMO ══ */
function fmtDate(ts){
  if(!ts)return"";
  const d=new Date(ts);
  return `${d.getFullYear().toString().slice(2)}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
}
function buildMemo(m){
  const el=document.createElement("div");
  el.className="memo-box"; el.style.cssText=`left:${m.x}px;top:${m.y}px`;
  const inner=document.createElement("div"); inner.className="memo-inner";
  const ta=document.createElement("textarea"); ta.spellcheck=false; ta.value=m.text||""; ta.placeholder="메모 입력"; ta.rows=2;
  const meta=document.createElement("div"); meta.className="memo-meta";
  function updateMeta(){
    const created=m.createdAt?`생성  ${fmtDate(m.createdAt)}`:"";
    const modified=(m.modifiedAt&&m.modifiedAt!==m.createdAt)?`수정  ${fmtDate(m.modifiedAt)}`:"";
    meta.innerHTML=(created?`<span>${created}</span>`:"")+(modified?`<span>${modified}</span>`:"");
    meta.style.display=(created||modified)?"flex":"none";
  }
  updateMeta();
  // 접기/펼치기 토글
  const toggle=document.createElement("div"); toggle.className="memo-toggle";
  let collapsed=m.collapsed||false;
  let _naturalH=0; // collapsed 전 자연스러운 scrollHeight 저장
  function applyCollapse(){
    if(collapsed){ ta.classList.add("collapsed"); toggle.innerHTML='<i class="ti ti-chevron-down" style="font-size:8px"></i>더 보기'; }
    else{ ta.classList.remove("collapsed"); toggle.innerHTML='<i class="ti ti-chevron-up" style="font-size:8px"></i>접기'; _naturalH=ta.scrollHeight; }
    // collapsed일 때는 _naturalH(저장값)로 판단, 아닐 때는 scrollHeight로 판단
    const measuredH=collapsed?_naturalH:ta.scrollHeight;
    // _naturalH===0이면 DOM 마운트 전 측정 실패 → 텍스트가 있으면 토글 버튼 표시 유지
    const needsToggle=(measuredH>36||(_naturalH===0&&ta.value.length>0))&&ta.value.length>0;
    toggle.style.display=needsToggle?"flex":"none";
    if(mlinks.some(l=>l.mid===m.id)) drawEdges();
  }
  const del=document.createElement("button"); del.className="memo-del"; del.innerHTML='<i class="ti ti-x" style="font-size:9px"></i>';
  const link=document.createElement("button"); link.className="memo-link"; link.title="노드와 연결"; link.innerHTML='<i class="ti ti-link" style="font-size:9px"></i>';
  inner.appendChild(ta); inner.appendChild(toggle); inner.appendChild(meta);
  el.appendChild(del); el.appendChild(link); el.appendChild(inner);
  function autoH(){
    // collapsed class 임시 제거 후 자연 높이 측정
    ta.classList.remove("collapsed");
    ta.style.height="auto"; ta.style.height=ta.scrollHeight+"px";
    _naturalH=ta.scrollHeight;
    applyCollapse();
  }
  toggle.addEventListener("mousedown",e=>e.stopPropagation());
  toggle.addEventListener("click",e=>{ e.stopPropagation(); collapsed=!collapsed; m.collapsed=collapsed; applyCollapse(); });
  link.addEventListener("mousedown",ev=>{
    ev.stopPropagation(); ev.preventDefault();
    mlinking={mid:m.id}; prevp.style.display=""; prevp.setAttribute("stroke","#c8c4a0"); prevp.setAttribute("stroke-dasharray","3 4");
  });
  ta.addEventListener("input",()=>{
    m.text=ta.value;
    if(!m.createdAt) m.createdAt=Date.now();
    m.modifiedAt=Date.now();
    updateMeta(); autoH();
  });
  ta.addEventListener("mousedown",e=>e.stopPropagation());
  ta.addEventListener("blur",()=>{ ta.classList.add("idle"); });
  ta.addEventListener("focus",()=>{ ta.classList.remove("idle"); });
  del.addEventListener("click",e=>{ e.stopPropagation(); snap(); memos=memos.filter(x=>x.id!==m.id); mlinks=mlinks.filter(l=>l.mid!==m.id); el.remove(); delete mEls[m.id]; drawEdges(); });
  el.addEventListener("click",ev=>{
    if(ev.target===ta||ev.target===del||ev.target.closest(".memo-del,.memo-link"))return;
    ev.stopPropagation();
    // select memo and highlight linked nodes
    document.querySelectorAll(".memo-box.sel").forEach(e=>e.classList.remove("sel"));
    el.classList.add("sel");
    const linked=mlinks.filter(l=>l.mid===m.id).map(l=>l.nid);
    deselectAll();
    if(linked.length>0){
      selGroup=new Set(linked);
      linked.forEach(nid=>{ if(nEls[nid])nEls[nid].classList.add("grp-sel"); });
    }
  });
  el.addEventListener("mousedown",ev=>{ if(ev.target===ta||ev.target===del||ev.target===link||ev.target.closest(".memo-del,.memo-link"))return; if(spaceDown){ dragState={type:"pan",sx:ev.clientX,sy:ev.clientY,ovx:vx,ovy:vy,moved:false}; wrap.style.cursor=getComputedStyle(document.documentElement).getPropertyValue('--cur-canvas-pan').trim()||"grab"; ev.preventDefault(); return; } ev.stopPropagation(); ev.preventDefault(); const c=s2c(ev.clientX,ev.clientY); dragState={type:"memo",id:m.id,ox:c.x-m.x,oy:c.y-m.y}; });
  nl.appendChild(el); mEls[m.id]=el;
  // DOM에 마운트된 후 자연 높이 측정 (scrollHeight가 정확히 계산됨)
  autoH();
}

/* ══ EDIT MODAL ══ */
const editModal=document.getElementById("edit-modal");
function openEditModal(target){
  editTarget=target;
  let title="", sec="", pin="", note="";
  if(target.type==="node"||target.type==="dec"){
    const n=nodes.find(x=>x.id===target.id); if(!n)return;
    title=n.label||""; sec=n.sec||""; pin=n.peak||""; note=n.note||"";
  }
  document.getElementById("edit-title").value=title;
  document.getElementById("edit-sec").value=sec;
  if(window._setEditorNote) window._setEditorNote(note);
  else document.getElementById("edit-note").value=note;
  // pin selector
  editPeak=pin;

let magnetOn = true;
const SNAP_THRESH = 8;   // 스냅 감지 거리 (canvas px)
const SNAP_RANGE  = 6;   // 스냅 적용 거리 (canvas px)
const snapSv = document.getElementById("snap-sv");

const btnMagnet = document.getElementById("btn-magnet");
btnMagnet.classList.add("active-tool"); // 기본 ON
btnMagnet.addEventListener("click", ()=>{
  magnetOn = !magnetOn;
  btnMagnet.classList.toggle("active-tool", magnetOn);
  if(!magnetOn) clearSnapLines();
});

function clearSnapLines(){
  while(snapSv.firstChild) snapSv.removeChild(snapSv.firstChild);
}

function makeLine(x1,y1,x2,y2){
  const line = document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",x1); line.setAttribute("y1",y1);
  line.setAttribute("x2",x2); line.setAttribute("y2",y2);
  line.setAttribute("stroke","#2c2c2e");
  line.setAttribute("stroke-width","0.75");
  line.setAttribute("stroke-dasharray","4 3");
  line.setAttribute("opacity","0.7");
  return line;
}

// cx,cy = 드래그 중인 노드의 후보 center, w/h = 그 노드 크기
// 다른 모든 노드와 비교해 수평/수직 정렬 + 등간격 gap 스냅 계산
function calcSnap(node, newX, newY){
  const w = nw(node), h = nh(node);
  // 드래그 노드의 후보 중심/엣지
  const cx = newX + w/2, cy = newY + h/2;
  const tEdge = newY, bEdge = newY + h;
  const lEdge = newX, rEdge = newX + w;

  const GAP_THRESH = 14; // gap 스냅 감지 거리 (정렬 스냅보다 넉넉하게)

  let snapX = null, snapY = null;
  const lines = [];

  // 다른 노드 목록 (id 제외)
  const others = nodes.filter(n => n.id !== node.id);

  others.forEach(n=>{
    const nW = nw(n), nH = nh(n);
    const ncx = n.x + nW/2, ncy = n.y + nH/2;
    const ntop = n.y, nbot = n.y + nH;
    const nleft = n.x, nright = n.x + nW;

    // -- 수직 정렬 (X축 스냅) --
    if(Math.abs(cx - ncx) < SNAP_THRESH && snapX === null){
      snapX = ncx - w/2;
      lines.push({type:"v", val:ncx});
    }
    if(Math.abs(lEdge - nleft) < SNAP_THRESH && snapX === null){
      snapX = nleft;
      lines.push({type:"v", val:nleft});
    }
    if(Math.abs(rEdge - nright) < SNAP_THRESH && snapX === null){
      snapX = nright - w;
      lines.push({type:"v", val:nright});
    }

    // -- 수평 정렬 (Y축 스냅) --
    if(Math.abs(cy - ncy) < SNAP_THRESH && snapY === null){
      snapY = ncy - h/2;
      lines.push({type:"h", val:ncy});
    }
    if(Math.abs(tEdge - ntop) < SNAP_THRESH && snapY === null){
      snapY = ntop;
      lines.push({type:"h", val:ntop});
    }
    if(Math.abs(bEdge - nbot) < SNAP_THRESH && snapY === null){
      snapY = nbot - h;
      lines.push({type:"h", val:nbot});
    }
  });

  // -- Gap 스냅: 두 노드 사이 등간격 위치로 스냅 --
  // X축: 드래그 노드가 두 노드 사이 중간에 오면 gap을 맞춤
  if(snapX === null){
    for(let i=0; i<others.length && snapX===null; i++){
      const a = others[i];
      const aW = nw(a), aRight = a.x + aW;
      for(let j=0; j<others.length && snapX===null; j++){
        if(i===j) continue;
        const b = others[j];
        const bLeft = b.x;
        // a가 왼쪽, b가 오른쪽인 경우만
        if(aRight >= bLeft) continue;
        const gapAB = bLeft - aRight; // a-b 사이 간격
        // 드래그 노드를 a 오른쪽에 붙일 때 gap이 같아지는 X
        // aRight + gap = lEdge  →  lEdge = aRight + (bLeft - aRight - w) / 2 아니라
        // gap 균등: a|gap|drag|gap|b  → gap = (bLeft - aRight - w) / 2
        // 또는 a 기준 gap: lEdge = aRight + gapAB (a-b간격만큼 띄움)
        const snapCandX1 = aRight + gapAB; // a 오른쪽에 a-b 간격으로
        const snapCandX2 = bLeft - w - gapAB; // b 왼쪽에 a-b 간격으로
        // 드래그 노드가 두 노드 사이에 있는 경우: 가운데 등간격
        if(bLeft - aRight > w){
          const midX = aRight + (bLeft - aRight - w)/2;
          if(Math.abs(lEdge - midX) < GAP_THRESH){
            snapX = midX;
            lines.push({type:"v", val:midX + w/2});
          }
        }
        // a 오른쪽에 a-b 간격
        if(snapX===null && Math.abs(lEdge - snapCandX1) < GAP_THRESH){
          snapX = snapCandX1;
          lines.push({type:"v", val:snapCandX1 + w/2});
        }
      }
    }
  }

  // Y축 gap 스냅
  if(snapY === null){
    for(let i=0; i<others.length && snapY===null; i++){
      const a = others[i];
      const aH = nh(a), aBot = a.y + aH;
      for(let j=0; j<others.length && snapY===null; j++){
        if(i===j) continue;
        const b = others[j];
        const bTop = b.y;
        if(aBot >= bTop) continue;
        const gapAB = bTop - aBot;
        // a-b 사이 가운데 등간격
        if(bTop - aBot > h){
          const midY = aBot + (bTop - aBot - h)/2;
          if(Math.abs(tEdge - midY) < GAP_THRESH){
            snapY = midY;
            lines.push({type:"h", val:midY + h/2});
          }
        }
        // a 아래 gap 간격
        if(snapY===null && Math.abs(tEdge - (aBot + gapAB)) < GAP_THRESH){
          snapY = aBot + gapAB;
          lines.push({type:"h", val:aBot + gapAB + h/2});
        }
      }
    }
  }

  // 단일 기준 노드 gap 스냅 (두 노드 쌍 없을 때 / 가장 가까운 노드 기준)
  // Y축: 위/아래 노드 기준으로 일정 간격 위치 스냅
  if(snapY === null){
    const SINGLE_GAP = 24; // 기본 gap 기준값 (정렬 메뉴 GAP과 동일)
    others.forEach(n=>{
      if(snapY !== null) return;
      const nH = nh(n), nBot = n.y + nH;
      // 아래쪽에 드래그 노드: n 하단 + SINGLE_GAP
      const candBelow = nBot + SINGLE_GAP;
      if(Math.abs(tEdge - candBelow) < GAP_THRESH){
        snapY = candBelow;
        lines.push({type:"h", val:candBelow + h/2});
      }
      // 위쪽에 드래그 노드: n 상단 - SINGLE_GAP - h
      if(snapY === null){
        const candAbove = n.y - SINGLE_GAP - h;
        if(Math.abs(tEdge - candAbove) < GAP_THRESH){
          snapY = candAbove;
          lines.push({type:"h", val:candAbove + h/2});
        }
      }
    });
  }

  if(snapX === null){
    const SINGLE_GAP = 24;
    others.forEach(n=>{
      if(snapX !== null) return;
      const nW = nw(n), nRight = n.x + nW;
      const candRight = nRight + SINGLE_GAP;
      if(Math.abs(lEdge - candRight) < GAP_THRESH){
        snapX = candRight;
        lines.push({type:"v", val:candRight + w/2});
      }
      if(snapX === null){
        const candLeft = n.x - SINGLE_GAP - w;
        if(Math.abs(lEdge - candLeft) < GAP_THRESH){
          snapX = candLeft;
          lines.push({type:"v", val:candLeft + w/2});
        }
      }
    });
  }

  return {
    x: snapX !== null ? snapX : newX,
    y: snapY !== null ? snapY : newY,
    lines
  };
}

function drawSnapLines(lines){
  clearSnapLines();
  // 가이드라인은 캔버스 좌표 -> 화면 좌표로 변환 없이
  // snap-sv는 cv-canvas 내부에 있어 같은 transform 공간 사용
  const BIG = 6000;
  lines.forEach(l=>{
    const ln = l.type === "v"
      ? makeLine(l.val, -BIG, l.val, BIG)
      : makeLine(-BIG, l.val, BIG, l.val);
    snapSv.appendChild(ln);
  });
}

/* ══ GLOBAL MOUSE ══ */
const lassoEl = document.getElementById("lasso-rect");
wrap.addEventListener("mousedown",ev=>{
  const tag=ev.target.tagName;
  if(ev.target===wrap||ev.target===cvcan||ev.target.id==="sv"||tag==="svg"||tag==="SVG"){
    if(document.activeElement&&document.activeElement.tagName==="TEXTAREA") document.activeElement.blur();
    ev.preventDefault();
    if(spaceDown){
      // 스페이스바 누름 → 캔버스 패닝
      dragState={type:"pan",sx:ev.clientX,sy:ev.clientY,ovx:vx,ovy:vy,moved:false};
      wrap.style.cursor=getComputedStyle(document.documentElement).getPropertyValue('--cur-canvas-pan').trim()||"grab";
    } else {
      // 기본 캔버스 드래그 → 라소 영역 선택
      const r=wrap.getBoundingClientRect();
      dragState={type:"lasso",sx:ev.clientX,sy:ev.clientY,
                 cx:ev.clientX-r.left, cy:ev.clientY-r.top, moved:false};
      lassoEl.style.cssText="display:none;left:0;top:0;width:0;height:0;";
    }
  }
});

document.addEventListener("mousemove",ev=>{
  if(!dragState&&!connecting&&!tlinking&&!reconnecting&&!mlinking)return;
  if(dragState){
    if(dragState.type==="pan"){
      if(Math.hypot(ev.clientX-dragState.sx,ev.clientY-dragState.sy)>3){
        dragState.moved=true;
        wrap.style.cursor=getComputedStyle(document.documentElement).getPropertyValue('--cur-grabbing').trim()||"grabbing";
      }
      vx=dragState.ovx+(ev.clientX-dragState.sx);
      vy=dragState.ovy+(ev.clientY-dragState.sy);
      applyVP(); return;
    }
    if(dragState.type==="lasso"){
      if(Math.hypot(ev.clientX-dragState.sx,ev.clientY-dragState.sy)>4){
        dragState.moved=true;
        const r=wrap.getBoundingClientRect();
        const cx=ev.clientX-r.left, cy=ev.clientY-r.top;
        const x=Math.min(dragState.cx,cx), y=Math.min(dragState.cy,cy);
        const w=Math.abs(cx-dragState.cx), h=Math.abs(cy-dragState.cy);
        lassoEl.style.cssText=`display:block;left:${x}px;top:${y}px;width:${w}px;height:${h}px;`;
        wrap.style.cursor="crosshair";
      }
      return;
    }
    if(dragState.type==="pending-node"||dragState.type==="pending-group"){
      if(Math.hypot(ev.clientX-dragState.sx,ev.clientY-dragState.sy)>4){
        // threshold 초과 → 실제 드래그로 전환
        if(dragState.type==="pending-node"){
          dragState.type="node"; dragState.moved=true;
        } else {
          dragState.type="group"; dragState.moved=true;
        }
      } else return;
    }
    if(dragState.type==="node"){
      const c=s2c(ev.clientX,ev.clientY);
      const node=nodes.find(n=>n.id===dragState.id); if(!node)return;
      if(Math.hypot(ev.clientX-dragState.sx,ev.clientY-dragState.sy)>3) dragState.moved=true;
      let newX=c.x-dragState.ox;
      let newY=c.y-dragState.oy;
      // Shift 누름 → 수평/수직 축 고정
      if(ev.shiftKey && dragState.moved){
        const totalDx=Math.abs(ev.clientX-dragState.sx);
        const totalDy=Math.abs(ev.clientY-dragState.sy);
        if(totalDx >= totalDy){ newY = node.y; } // 수평 이동
        else { newX = node.x; }                   // 수직 이동
      }
      if(magnetOn){
        const snap=calcSnap(node,newX,newY);
        newX=snap.x; newY=snap.y;
        drawSnapLines(snap.lines);
      } else {
        clearSnapLines();
      }
      if(newX<BOUNDARY_X){ node.x=BOUNDARY_X; showToast("이 옆으로는 노드를 배치할 수 없습니다"); }
      else{ node.x=newX; }
      if(newY<BOUNDARY_Y){ node.y=BOUNDARY_Y; showToast("이 위로는 노드를 배치할 수 없습니다"); }
      else{ node.y=newY; }
      const el=nEls[node.id]; if(el){el.style.left=node.x+"px";el.style.top=node.y+"px";}
      drawEdges(); return;
    }
    if(dragState.type==="tbox"){
      const c=s2c(ev.clientX,ev.clientY);
      const t=tboxes.find(x=>x.id===dragState.id); if(!t)return;
      if(Math.hypot(ev.clientX-dragState.sx,ev.clientY-dragState.sy)>3) dragState.moved=true;
      t.x=Math.max(BOUNDARY_X,c.x-dragState.ox); t.y=Math.max(BOUNDARY_Y,c.y-dragState.oy);
      if(tEls[t.id]){tEls[t.id].style.left=t.x+"px";tEls[t.id].style.top=t.y+"px";}
      if(tlinks.some(l=>l.tid===t.id)) drawEdges();
      return;
    }
    if(dragState.type==="memo"){
      const c=s2c(ev.clientX,ev.clientY);
      const m=memos.find(x=>x.id===dragState.id); if(!m)return;
      m.x=Math.max(BOUNDARY_X,c.x-dragState.ox); m.y=Math.max(BOUNDARY_Y,c.y-dragState.oy);
      if(mEls[m.id]){mEls[m.id].style.left=m.x+"px";mEls[m.id].style.top=m.y+"px";}
      if(mlinks.some(l=>l.mid===m.id)) drawEdges();
      return;
    }
    if(dragState.type==="group"){
      const c=s2c(ev.clientX,ev.clientY);
      if(Math.hypot(ev.clientX-dragState.sx,ev.clientY-dragState.sy)>3) dragState.moved=true;
      // Shift 누름 → 수평/수직 축 고정
      const totalDx=Math.abs(ev.clientX-dragState.sx);
      const totalDy=Math.abs(ev.clientY-dragState.sy);
      const lockH = ev.shiftKey && dragState.moved && totalDx >= totalDy; // 수평 고정
      const lockV = ev.shiftKey && dragState.moved && totalDy >  totalDx; // 수직 고정
      let blocked=false;
      selGroup.forEach(id=>{
        const n=nodes.find(x=>x.id===id); if(!n)return;
        const off=dragState.offs[id]; if(!off)return;
        n.x=lockV  ? n.x : Math.max(BOUNDARY_X,c.x-off.ox);
        const newY=lockH ? n.y : c.y-off.oy;
        if(newY<BOUNDARY_Y){ n.y=BOUNDARY_Y; blocked=true; } else if(!lockH){ n.y=newY; }
        if(nEls[id]){nEls[id].style.left=n.x+"px";nEls[id].style.top=n.y+"px";}
      });
      selTGroup.forEach(id=>{
        const t=tboxes.find(x=>x.id===id); if(!t)return;
        const off=dragState.toffs&&dragState.toffs[id]; if(!off)return;
        t.x=Math.max(BOUNDARY_X,c.x-off.ox); t.y=Math.max(0,c.y-off.oy);
        if(tEls[id]){tEls[id].style.left=t.x+"px";tEls[id].style.top=t.y+"px";}
      });
      if(dragState.moffs){
        Object.entries(dragState.moffs).forEach(([mid,off])=>{
          const m=memos.find(x=>x.id===mid); if(!m)return;
          m.x=Math.max(BOUNDARY_X,c.x-off.ox); m.y=Math.max(0,c.y-off.oy);
          if(mEls[mid]){mEls[mid].style.left=m.x+"px";mEls[mid].style.top=m.y+"px";}
        });
      }
      if(blocked) showToast("이 위로는 노드를 배치할 수 없습니다");
      drawEdges(); return;
    }
  }
  if(connecting){
    const c=s2c(ev.clientX,ev.clientY);
    const sn=nodes.find(n=>n.id===connecting.nid); if(!sn)return;
    const sp=portPt(sn,connecting.side);
    prevp.setAttribute("d",`M${sp.x},${sp.y} L${c.x},${c.y}`);
    // highlight nearest target
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const SNAP=36; let best=SNAP,bNid=null;
    nodes.forEach(n=>{
      if(n.id===connecting.nid)return;
      ["r","l","t","b"].forEach(s=>{ const p=portPt(n,s),d=Math.hypot(p.x-c.x,p.y-c.y); if(d<best){best=d;bNid=n.id;} });
      const w=nw(n),h=nh(n); if(c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8) bNid=n.id;
    });
    if(bNid&&nEls[bNid])nEls[bNid].classList.add("drop-hi");
  }
  if(tlinking){
    const t=tboxes.find(x=>x.id===tlinking.tid); if(!t)return;
    const a=tboxAnchor(t); if(!a)return;
    const c=s2c(ev.clientX,ev.clientY);
    prevp.setAttribute("d",`M${a.x},${a.y} L${c.x},${c.y}`);
    prevp.setAttribute("stroke-dasharray","3 4"); prevp.setAttribute("stroke","#9b9a96");
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const hn=nodes.find(n=>{ const w=nw(n),h=nh(n); return c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8; });
    if(hn&&nEls[hn.id])nEls[hn.id].classList.add("drop-hi");
  }
  if(mlinking){
    const m=memos.find(x=>x.id===mlinking.mid); if(!m)return;
    const a=memoAnchor(m); if(!a)return;
    const c=s2c(ev.clientX,ev.clientY);
    prevp.setAttribute("d",`M${a.x},${a.y} L${c.x},${c.y}`);
    prevp.setAttribute("stroke-dasharray","3 4"); prevp.setAttribute("stroke","#c8c4a0");
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const hn=nodes.find(n=>{ const w=nw(n),h=nh(n); return c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8; });
    if(hn&&nEls[hn.id])nEls[hn.id].classList.add("drop-hi");
  }
  if(reconnecting){
    const c=s2c(ev.clientX,ev.clientY);
    const fn=nodes.find(n=>n.id===reconnecting.fixedNid); if(!fn)return;
    const fp=portPt(fn,reconnecting.fixedSide);
    prevp.setAttribute("d",`M${fp.x},${fp.y} L${c.x},${c.y}`);
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const SNAP=36; let best=SNAP,bNid=null;
    nodes.forEach(n=>{
      if(n.id===reconnecting.fixedNid)return;
      ["r","l","t","b"].forEach(s=>{ const p=portPt(n,s),d=Math.hypot(p.x-c.x,p.y-c.y); if(d<best){best=d;bNid=n.id;} });
      const w=nw(n),h=nh(n); if(c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8) bNid=n.id;
    });
    if(bNid&&nEls[bNid])nEls[bNid].classList.add("drop-hi");
  }
});

document.addEventListener("mouseup",ev=>{
  wrap.style.cursor="";
  clearSnapLines();
  if(dragState){
    if(dragState.type==="node"||dragState.type==="group"){
      _lastNodeMoved = true;
      // 드래그 확정 시 패널 닫기 + 선택 해제
      if(selNode){ selNode=null; dp.classList.remove("open"); document.querySelectorAll(".fn.sel,.dn.sel").forEach(e=>e.classList.remove("sel")); }
      // mouseup 직후 발화될 수 있는 click 이벤트를 캡처 단계에서 한 번 차단
      const _blockClick = e=>{ e.stopImmediatePropagation(); e.preventDefault(); };
      document.addEventListener('click', _blockClick, {capture:true, once:true});
      snap();
    }
    // pending = threshold 미달 = 클릭으로 처리, 패널 차단 안 함
    if(dragState.type==="pending-node"||dragState.type==="pending-group"){
      _lastNodeMoved = false;
    }
    if(dragState.type==="pan"){
      _lastNodeMoved = !!(dragState.moved);
      if(dragState.moved){
        const _blockClick = e=>{ e.stopImmediatePropagation(); e.preventDefault(); };
        document.addEventListener('click', _blockClick, {capture:true, once:true});
      }
    }
    if(dragState.type==="lasso"){
      lassoEl.style.display="none";
      wrap.style.cursor="";
      _lastNodeMoved = false;
      if(dragState.moved){
        // 라소 영역을 canvas 좌표로 변환
        const r=wrap.getBoundingClientRect();
        const x1=Math.min(dragState.cx, ev.clientX-r.left);
        const y1=Math.min(dragState.cy, ev.clientY-r.top);
        const x2=Math.max(dragState.cx, ev.clientX-r.left);
        const y2=Math.max(dragState.cy, ev.clientY-r.top);
        // screen → canvas 좌표
        const c1=s2c(x1+r.left, y1+r.top);
        const c2=s2c(x2+r.left, y2+r.top);
        // 기존 선택 초기화
        selNode=null; dp.classList.remove("open");
        document.querySelectorAll(".fn.sel,.dn.sel").forEach(e=>e.classList.remove("sel"));
        selGroup.forEach(id=>{ const el=nEls[id]; if(el) el.classList.remove("grp-sel"); });
        selGroup.clear(); selTGroup.clear();
        // 범위 내 노드 추가 (rv-hidden 및 비활성 시나리오 노드 제외)
        const inScnMode = nl.classList.contains('scn-mode');
        nodes.forEach(n=>{
          const el=nEls[n.id];
          if(!el || el.classList.contains("rv-hidden")) return;
          // 시나리오 모드에서 다른 시나리오 소속 노드 제외
          if(inScnMode && n.ownScn && activeSCN &&
            !(activeSCN.secId===n.ownScn.secId && activeSCN.cardId===n.ownScn.cardId)) return;
          const nW=nw(n), nH=nh(n);
          if(n.x < c2.x && n.x+nW > c1.x && n.y < c2.y && n.y+nH > c1.y){
            selGroup.add(n.id);
            el.classList.remove("sel"); el.classList.add("grp-sel");
          }
        });
        if(selGroup.size===1){
          // 1개면 단일 선택으로 전환
          const id=[...selGroup][0];
          selGroup.clear();
          const el=nEls[id]; if(el){ el.classList.remove("grp-sel"); el.classList.add("sel"); }
          selNode=id;
          const node=nodes.find(n=>n.id===id); if(node) openDetail(node);
          const _blockClick = e=>{ e.stopImmediatePropagation(); e.preventDefault(); };
          document.addEventListener('click', _blockClick, {capture:true, once:true});
        }
        if(selGroup.size>1){
          const _blockClick = e=>{ e.stopImmediatePropagation(); e.preventDefault(); };
          document.addEventListener('click', _blockClick, {capture:true, once:true});
        }
      }
    }
    if(dragState.type==="tbox"){
      if(!dragState.moved&&dragState.ta){ dragState.ta.focus(); }
      else snap();
    }
    dragState=null;
  }
  if(connecting){
    prevp.style.display="none"; prevp.setAttribute("d","");
    document.querySelectorAll(".pt.act").forEach(p=>p.classList.remove("act"));
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const c=s2c(ev.clientX,ev.clientY);
    const SNAP=36; let tNid=null, tSide=null;
    // exact port hit
    const el2=document.elementFromPoint(ev.clientX,ev.clientY);
    if(el2&&el2.classList.contains("pt")&&el2.dataset.nid!==connecting.nid){ tNid=el2.dataset.nid; tSide=el2.dataset.s; }
    // nearest port snap
    if(!tNid){
      let best=SNAP;
      nodes.forEach(n=>{
        if(n.id===connecting.nid)return;
        ["r","l","t","b"].forEach(s=>{ const p=portPt(n,s),d=Math.hypot(p.x-c.x,p.y-c.y); if(d<best){best=d;tNid=n.id;tSide=s;} });
      });
    }
    // node body drop
    if(!tNid){
      const hn=nodes.find(n=>{ if(n.id===connecting.nid)return false; const w=nw(n),h=nh(n); return c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8; });
      if(hn){ let best=Infinity; ["r","l","t","b"].forEach(s=>{ const p=portPt(hn,s),d=Math.hypot(p.x-c.x,p.y-c.y); if(d<best){best=d;tSide=s;} }); tNid=hn.id; }
    }
    if(tNid&&tSide){ snap(); edges.push({id:"e"+(++cnt),from:connecting.nid,fs:connecting.side,to:tNid,ts:tSide,label:null,color:defaultEdgeColor,dash:defaultEdgeDash}); drawEdges(); }
    connecting=null;
  }
  if(tlinking){
    prevp.style.display="none"; prevp.setAttribute("d",""); prevp.setAttribute("stroke-dasharray","5 3"); prevp.setAttribute("stroke","#1e3a6e");
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const c=s2c(ev.clientX,ev.clientY);
    const hn=nodes.find(n=>{ const w=nw(n),h=nh(n); return c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8; });
    if(hn){
      const exists=tlinks.some(l=>l.tid===tlinking.tid&&l.nid===hn.id);
      if(!exists){ snap(); tlinks.push({id:"tl"+(++cnt),tid:tlinking.tid,nid:hn.id}); drawEdges(); }
    }
    tlinking=null;
  }
  if(mlinking){
    prevp.style.display="none"; prevp.setAttribute("d",""); prevp.setAttribute("stroke-dasharray","5 3");
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const c=s2c(ev.clientX,ev.clientY);
    const hn=nodes.find(n=>{ const w=nw(n),h=nh(n); return c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8; });
    if(hn){
      const exists=mlinks.some(l=>l.mid===mlinking.mid&&l.nid===hn.id);
      if(!exists){ snap(); mlinks.push({id:"ml"+(++cnt),mid:mlinking.mid,nid:hn.id}); drawEdges(); }
    }
    mlinking=null;
  }
  if(reconnecting){
    prevp.style.display="none"; prevp.setAttribute("d",""); prevp.setAttribute("stroke-dasharray","5 3"); prevp.setAttribute("stroke","#1e3a6e");
    document.querySelectorAll(".fn.drop-hi,.dn.drop-hi").forEach(e=>e.classList.remove("drop-hi"));
    const c=s2c(ev.clientX,ev.clientY);
    const SNAP=36; let tNid=null, tSide=null;
    const el2=document.elementFromPoint(ev.clientX,ev.clientY);
    if(el2&&el2.classList.contains("pt")&&el2.dataset.nid!==reconnecting.fixedNid){ tNid=el2.dataset.nid; tSide=el2.dataset.s; }
    if(!tNid){
      let best=SNAP;
      nodes.forEach(n=>{
        if(n.id===reconnecting.fixedNid)return;
        ["r","l","t","b"].forEach(s=>{ const p=portPt(n,s),d=Math.hypot(p.x-c.x,p.y-c.y); if(d<best){best=d;tNid=n.id;tSide=s;} });
      });
    }
    if(!tNid){
      const hn=nodes.find(n=>{ if(n.id===reconnecting.fixedNid)return false; const w=nw(n),h=nh(n); return c.x>=n.x-8&&c.x<=n.x+w+8&&c.y>=n.y-8&&c.y<=n.y+h+8; });
      if(hn){ let best=Infinity; ["r","l","t","b"].forEach(s=>{ const p=portPt(hn,s),d=Math.hypot(p.x-c.x,p.y-c.y); if(d<best){best=d;tSide=s;} }); tNid=hn.id; }
    }
    if(tNid&&tSide){
      snap();
      const e=edges[reconnecting.ei];
      if(e){
        if(reconnecting.end==="from"){ e.from=tNid; e.fs=tSide; }
        else { e.to=tNid; e.ts=tSide; }
      }
      drawEdges();
    }
    reconnecting=null;
  }
});

wrap.addEventListener("wheel",ev=>{
  ev.preventDefault();
  const r=wrap.getBoundingClientRect();
  const mx=ev.clientX-r.left, my=ev.clientY-r.top;
  const f=ev.deltaY>0?0.9:1.1;
  const nz=Math.min(Math.max(vz*f,0.1),4);
  vx=mx-(mx-vx)*nz/vz; vy=my-(my-vy)*nz/vz; vz=nz; applyVP();
},{passive:false});

wrap.addEventListener("click",ev=>{ if(ev.target===wrap||ev.target===cvcan){ if(_lastNodeMoved){_lastNodeMoved=false;return;} clearSel(); } });

/* ══ FIT VIEW ══ */
function fitView(){
  if(!nodes.length){vx=0;vy=0;vz=1;applyVP();return;}
  const r=wrap.getBoundingClientRect();
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  nodes.forEach(n=>{x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);x1=Math.max(x1,n.x+nw(n));y1=Math.max(y1,n.y+nh(n));});
  const pw=r.width,ph=r.height,cw=x1-x0+120,ch=y1-y0+120;
  vz=Math.min(pw/cw,ph/ch,1.2);
  vx=(pw-cw*vz)/2-(x0-60)*vz;
  vy=(ph-ch*vz)/2-(y0-60)*vz;
  applyVP();
}

// 섹션: {id, title, items:[{id,title}]}
// 노드 자체에 ownScn:{secId,cardId} 저장 (1:1 귀속)

// 빈 시나리오 - 항상 존재, 삭제 불가
const BLANK_SEC_ID  = 'sec-blank';
const BLANK_CARD_ID = 'SCN-BLANK';

function ensureBlankSection(){
  if(!scnSections.find(s=>s.id===BLANK_SEC_ID)){
    scnSections.unshift({id:BLANK_SEC_ID, title:'기본', items:[{id:BLANK_CARD_ID, title:'빈 시나리오'}]});
  }
}

let scnSections = [];
ensureBlankSection();

// 섹션 collapsed 상태
const scnCollapsed = {};
// 드래그 상태
let scnDragItem = null;
let scnDragOverItem = null;

/* ══ SCENARIO TAB ══ */
// 앱 시작 시 빈 시나리오가 기본 활성
let activeSCN = {secId: BLANK_SEC_ID, cardId: BLANK_CARD_ID};

function getActiveSCNObj(){
  if(!activeSCN) return null;
  const sec = scnSections.find(s=>s.id===activeSCN.secId);
  if(!sec) return null;
  return sec.items.find(it=>it.id===activeSCN.cardId)||null;
}

// 현재 귀속 대상 반환 - 항상 빈 시나리오 이상을 보장
function currentOwnScn(){
  if(activeSCN) return {...activeSCN};
  return {secId:BLANK_SEC_ID, cardId:BLANK_CARD_ID};
}

// import 후 빈 시나리오 보장
function afterImport(){
  ensureBlankSection();
  if(!activeSCN) activeSCN={secId:BLANK_SEC_ID,cardId:BLANK_CARD_ID};
}

function renderSCN(){
  const inner = document.getElementById('sb-scn-inner');
  inner.innerHTML = '';

  if(scnSections.length === 0){
    const empty = document.createElement('div');
    empty.style.cssText = 'padding:24px 12px;text-align:center;font-size:11px;color:#c0bfba;line-height:1.7';
    empty.innerHTML = '섹션과 시나리오를 추가해<br>작업을 시작하세요';
    inner.appendChild(empty);
    return;
  }

  scnSections.forEach(sec => {
    const secEl = document.createElement('div');
    secEl.className = 'scn-section';
    secEl.dataset.secId = sec.id;
    const isBlankSec = sec.id===BLANK_SEC_ID;
    secEl.draggable = !isBlankSec;

    const isCollapsed = scnCollapsed[sec.id];

    // 이 섹션 내 시나리오 중 노드가 귀속된 것 수
    const nodeCountMap = {}; // cardId -> node count
    nodes.forEach(n => {
      if(n.ownScn && n.ownScn.secId === sec.id){
        nodeCountMap[n.ownScn.cardId] = (nodeCountMap[n.ownScn.cardId]||0)+1;
      }
    });

    const hdEl = document.createElement('div');
    hdEl.className = 'scn-section-hd' + (isCollapsed?' collapsed':'');
    hdEl.innerHTML = `
      <span class="drag-grip" style="${isBlankSec?'visibility:hidden':''}"><i class="ti ti-grip-vertical"></i></span>
      <span class="scn-grp-lbl">${escHtml(sec.title)}</span>
      <span class="scn-grp-ct">${sec.items.length}</span>
      <span class="scn-grp-acts">
        <button class="scn-grp-act" data-act="edit-sec" title="섹션 이름 수정"><i class="ti ti-pencil" style="font-size:12px"></i></button>
        ${!isBlankSec?'<button class="scn-grp-act" data-act="add-card-sec" title="이 섹션에 시나리오 추가"><i class="ti ti-plus" style="font-size:12px"></i></button>':''}
        ${!isBlankSec?'<button class="scn-grp-act" data-act="del-sec" style="color:#e24b4a" title="섹션 삭제"><i class="ti ti-trash" style="font-size:12px"></i></button>':''}
      </span>
      <span class="scn-chev"><i class="ti ti-chevron-down"></i></span>`;

    hdEl.addEventListener('click', ev => {
      if(ev.target.closest('.scn-grp-acts,.drag-grip')) return;
      scnCollapsed[sec.id] = !scnCollapsed[sec.id]; renderSCN();
    });
    // edit-sec: 기본 섹션 포함 모든 섹션 수정 가능
    hdEl.querySelector('[data-act="edit-sec"]').addEventListener('click', ev => {
      ev.stopPropagation(); openScnModal('edit-sec', sec.id);
    });
    if(!isBlankSec){
    hdEl.querySelector('[data-act="add-card-sec"]').addEventListener('click', ev => {
      ev.stopPropagation(); openScnModal('add-card', sec.id);
    });
    hdEl.querySelector('[data-act="del-sec"]').addEventListener('click', async ev => {
      ev.stopPropagation();
      if(sec.id===BLANK_SEC_ID){showToast('기본 섹션은 삭제할 수 없습니다');return;}
      const affectedNodes = nodes.filter(n=>n.ownScn&&n.ownScn.secId===sec.id);
      const msg = affectedNodes.length > 0
        ? `"${sec.title}" 섹션을 삭제하면 귀속된 노드 ${affectedNodes.length}개의 귀속이 빈 시나리오로 이동합니다.\n삭제할까요?`
        : `"${sec.title}" 섹션을 삭제할까요?`;
      if(!await cdlg.confirm(msg, {okLabel:'삭제', danger:true})) return;
      // 귀속된 노드 → 빈 시나리오로 이동
      affectedNodes.forEach(n => { n.ownScn = {secId:BLANK_SEC_ID, cardId:BLANK_CARD_ID}; });
      scnSections = scnSections.filter(s=>s.id!==sec.id);
      ensureBlankSection();
      if(activeSCN?.secId===sec.id){ activeSCN={secId:BLANK_SEC_ID,cardId:BLANK_CARD_ID}; clearSCNHighlight(); } else renderSCN();
    });
    } // end if(!isBlankSec)

    // 섹션 드래그
    secEl.addEventListener('dragstart', ev => {
      scnDragItem = {type:'section', secId:sec.id};
      ev.dataTransfer.effectAllowed='move';
      ev.dataTransfer.setData('text/plain','sec:'+sec.id);
      setTimeout(()=>secEl.style.opacity='0.4', 0);

    secEl.addEventListener('dragend', ()=>{
      secEl.style.opacity='';
      document.querySelectorAll('.scn-section.drag-over,.scn-card2.drag-over').forEach(el=>el.classList.remove('drag-over'));
      scnDragItem=null; scnDragOverItem=null;
    });
    secEl.addEventListener('dragover', ev => {
      if(!scnDragItem) return;
      ev.preventDefault(); ev.stopPropagation();
      if(scnDragItem.type==='section' && scnDragItem.secId!==sec.id){
        document.querySelectorAll('.scn-section.drag-over').forEach(el=>el.classList.remove('drag-over'));
        secEl.classList.add('drag-over');
      }
    });
    secEl.addEventListener('drop', ev => {
      ev.preventDefault(); ev.stopPropagation();
      if(scnDragItem?.type==='section' && scnDragItem.secId!==sec.id){
        const fi=scnSections.findIndex(s=>s.id===scnDragItem.secId);
        const ti=scnSections.findIndex(s=>s.id===sec.id);
        if(fi>=0&&ti>=0){
          // 기본 섹션은 항상 첫 번째 고정
          if(scnDragItem.secId===BLANK_SEC_ID||sec.id===BLANK_SEC_ID){renderSCN();return;}
          const[mv]=scnSections.splice(fi,1);scnSections.splice(ti,0,mv);
          ensureBlankSection(); renderSCN();
        }
      } else if(scnDragItem?.type==='card' && scnDragItem.secId!==sec.id){
        const fromSec=scnSections.find(s=>s.id===scnDragItem.secId);

        const[mv]=fromSec.items.splice(ci,1);

        nodes.forEach(n=>{if(n.ownScn&&n.ownScn.secId===fromSec.id&&n.ownScn.cardId===mv.id) n.ownScn.secId=sec.id;});

      cardEl.addEventListener('click', ev => {

        highlightSCN(sec.id, item.id);
      });
      // edit은 빈 시나리오도 허용
      if(cardEl.querySelector('[data-act="edit"]')){
      cardEl.querySelector('[data-act="edit"]').addEventListener('click', ev => {
        ev.stopPropagation(); openScnModal('edit-card', sec.id, item.id);

      if(!isBlankCard){

        const affectedIds = new Set(affected.map(n=>n.id));
        const msg = affected.length > 0
          ? `"${item.title}" 시나리오를 삭제하면\n귀속된 노드 ${affected.length}개와 연결선이 함께 삭제됩니다.\n\n삭제하시겠습니까?`
          : `"${item.title}" 시나리오를 삭제하시겠습니까?`;
        if(!await cdlg.confirm(msg, {title:'시나리오 삭제', okLabel:'삭제', danger:true})) return;
        snap();
        // 귀속된 노드·엣지·tlink·mlink 삭제
        if(affectedIds.size > 0){
          affectedIds.forEach(id=>{ if(nEls[id]){nEls[id].remove();delete nEls[id];} });
          nodes = nodes.filter(n=>!affectedIds.has(n.id));
          edges = edges.filter(e=>!affectedIds.has(e.from)&&!affectedIds.has(e.to));
          tlinks = tlinks.filter(l=>!affectedIds.has(l.nid));
          mlinks = mlinks.filter(l=>!affectedIds.has(l.nid));
          if(selNode && affectedIds.has(selNode)){ selNode=null; dp.classList.remove('open'); }
          selGroup = new Set([...selGroup].filter(id=>!affectedIds.has(id)));
        }
        sec.items = sec.items.filter(it=>it.id!==item.id);
        ensureBlankSection();
        drawEdges();
        if(activeSCN?.secId===sec.id&&activeSCN?.cardId===item.id){
          activeSCN={secId:BLANK_SEC_ID,cardId:BLANK_CARD_ID}; clearSCNHighlight();
        } else renderSCN();
      });
      } // end if(!isBlankCard)

      // 카드 드래그
      cardEl.addEventListener('dragstart', ev => {
        ev.stopPropagation();
        scnDragItem = {type:'card', secId:sec.id, cardId:item.id};
        ev.dataTransfer.effectAllowed='move';
        ev.dataTransfer.setData('text/plain','card:'+item.id);
        setTimeout(()=>cardEl.style.opacity='0.4', 0);
      });
      cardEl.addEventListener('dragend', ev => {
        ev.stopPropagation(); cardEl.style.opacity='';
        document.querySelectorAll('.scn-card2.drag-over').forEach(el=>el.classList.remove('drag-over'));
        scnDragItem=null; scnDragOverItem=null;
      });
      cardEl.addEventListener('dragover', ev => {
        if(!scnDragItem||scnDragItem.type!=='card') return;
        ev.preventDefault(); ev.stopPropagation();
        if(scnDragItem.cardId!==item.id){
          document.querySelectorAll('.scn-card2.drag-over').forEach(el=>el.classList.remove('drag-over'));
          cardEl.classList.add('drag-over');
        }
      });
      cardEl.addEventListener('drop', ev => {
        ev.preventDefault(); ev.stopPropagation();
        if(scnDragItem?.type!=='card'||scnDragItem.cardId===item.id) return;
        const fromSec=scnSections.find(s=>s.id===scnDragItem.secId);
        const toSec=scnSections.find(s=>s.id===sec.id);
        if(!fromSec||!toSec) return;
        const fi=fromSec.items.findIndex(it=>it.id===scnDragItem.cardId);
        if(fi<0) return;
        const[mv]=fromSec.items.splice(fi,1);
        // 다른 섹션으로 이동 시 ownScn.secId 업데이트
        if(fromSec.id!==toSec.id){
          nodes.forEach(n=>{if(n.ownScn&&n.ownScn.secId===fromSec.id&&n.ownScn.cardId===mv.id) n.ownScn.secId=toSec.id;});
        }
        const ti2=toSec.items.findIndex(it=>it.id===item.id);
        toSec.items.splice(ti2,0,mv);
        renderSCN();
      });

      bodyEl.appendChild(cardEl);
    });

    secEl.appendChild(bodyEl);
    inner.appendChild(secEl);
  });
}

function highlightSCN(secId, cardId){
  const sec = scnSections.find(s=>s.id===secId);
  const item = sec?.items.find(it=>it.id===cardId);
  if(!item) return;

  // 같은 시나리오 재클릭 → 해제
  if(activeSCN && activeSCN.secId===secId && activeSCN.cardId===cardId){
    clearSCNHighlight(); return;
  }
  activeSCN = {secId, cardId};

  // 딤 토글 상태 초기화
  scnDimOff = false;
  const viewAllBtn = document.getElementById('scn-view-all');
  if(viewAllBtn){
    viewAllBtn.textContent='모두 보기'; viewAllBtn.classList.remove('dim-off');
    const totalScn = scnSections.reduce((s,sec)=>s+sec.items.length, 0);
    const hide = totalScn <= 1;
    viewAllBtn.style.display = hide ? 'none' : '';
    const sep = document.querySelector('#scn-banner .banner-sep');
    if(sep) sep.style.display = hide ? 'none' : '';
  }

  const nlEl = document.getElementById('nl');
  const svEl = document.getElementById('sv');
  nlEl.classList.add('scn-mode');
  svEl.classList.add('scn-mode');

  // ownScn 기반으로 하이라이트 - 이 시나리오에 귀속된 노드
  const hiNodeIds = new Set();
  nodes.forEach(n => {
    const el = nEls[n.id]; if(!el) return;
    const owned = n.ownScn && n.ownScn.secId===secId && n.ownScn.cardId===cardId;
    if(owned){ el.classList.add('scn-hi'); hiNodeIds.add(n.id); }
    else el.classList.remove('scn-hi');
  });

  // 같은 시나리오에 귀속된 노드 사이 엣지만 강조
  svEl.querySelectorAll('.ecg').forEach(eg => {
    const from=eg.dataset.from, to=eg.dataset.to;
    if(from&&to&&hiNodeIds.has(from)&&hiNodeIds.has(to)) eg.classList.add('scn-edge-hi');
    else eg.classList.remove('scn-edge-hi');
  });

  // 배너 표시 - 항상 노출 (빈 시나리오 포함)
  const bannerText = document.getElementById('scn-banner-text');
  const banner = document.getElementById('scn-banner');
  bannerText.textContent = cardId === BLANK_CARD_ID ? item.title : (item.id + ' · ' + item.title);
  banner.classList.add('show');

  const hiNodes = nodes.filter(n => n.ownScn && n.ownScn.secId===secId && n.ownScn.cardId===cardId);
  if(hiNodes.length > 0){ fitToNodes(hiNodes); }
  else { showToast(item.id + ': 귀속된 노드가 없습니다'); }

  renderSCN();
}

function fitToNodes(targetNodes){
  if(!targetNodes.length) return;
  const PAD = 80;
  let x1=Infinity, y1=Infinity, x2=-Infinity, y2=-Infinity;
  targetNodes.forEach(n => {
    const w = n.isTerm?160:n.isDec?150:180;
    const h = n.isTerm?44:n.isDec?96:52;
    x1=Math.min(x1,n.x); y1=Math.min(y1,n.y);
    x2=Math.max(x2,n.x+w); y2=Math.max(y2,n.y+h);
  });
  const wr = wrap.getBoundingClientRect();
  const bw = x2-x1 || 1, bh = y2-y1 || 1;
  // 가로/세로 중 더 작은 비율을 써야 전체가 화면 안에 들어옴
  const newVz = Math.min((wr.width-PAD*2)/bw, (wr.height-PAD*2)/bh, 1.4);
  const cx = (x1+x2)/2, cy = (y1+y2)/2;
  vx = wr.width/2 - cx*newVz;
  vy = wr.height/2 - cy*newVz;
  vz = Math.max(newVz, 0.15);
  applyVP();
}

function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function nextScnAutoId(){
  let max = 0;
  scnSections.forEach(s => s.items.forEach(it => {
    const m = it.id.match(/(\d+)$/);
    if(m) max = Math.max(max, parseInt(m[1]));
  }));
  const n = max + 1;
  return String(n).padStart(2, '0');
}

let _dimMousedownEl = null; // mousedown 시점의 딤 노드 엘리먼트 기억
document.addEventListener('mousedown', ev => {
  _dimMousedownEl = null;
  if(!nl.classList.contains('scn-mode')) return;
  if(!activeSCN) return;
  const nodeEl = ev.target.closest('.fn,.dn');
  if(!nodeEl) return;
  if(ev.target.classList.contains('pt') || ev.target.closest('.fn-del,.dn-del')) return;
  if(nodeEl.classList.contains('scn-hi')) return;
  _dimMousedownEl = nodeEl; // 딤 노드 mousedown 기록
}, true);

document.addEventListener('mouseup', async ev => {
  if(!_dimMousedownEl) return;
  const released = ev.target.closest('.fn,.dn');
  if(released !== _dimMousedownEl){ _dimMousedownEl = null; return; }
  const nodeEl = _dimMousedownEl;
  _dimMousedownEl = null;

  if(!nl.classList.contains('scn-mode') || !activeSCN) return;
  if(nodeEl.classList.contains('scn-hi')) return;
  if(ev.target.classList.contains('pt') || ev.target.closest('.fn-del,.dn-del')) return;

  const nid = Object.keys(nEls).find(id => nEls[id] === nodeEl);
  if(!nid) return;
  const targetNode = nodes.find(n => n.id === nid);
  if(!targetNode || !targetNode.ownScn) return;

  const {secId, cardId} = targetNode.ownScn;
  if(activeSCN.secId === secId && activeSCN.cardId === cardId) return;

  ev.stopImmediatePropagation();

  // 이후 발화되는 click 이벤트도 한 번 막아 wrap click → deselectAll 방지
  const blockNextClick = (e) => { e.stopImmediatePropagation(); e.preventDefault(); };
  document.addEventListener('click', blockNextClick, {capture:true, once:true});

  const targetSec = scnSections.find(s => s.id === secId);
  const targetItem = targetSec?.items.find(it => it.id === cardId);
  const targetLabel = targetItem
    ? (cardId === BLANK_CARD_ID ? targetItem.title : targetItem.id + ' · ' + targetItem.title)
    : cardId;

  const ok = await cdlg.confirm(`"${targetLabel}" 시나리오로 전환할까요?`, {okLabel:'전환'});
  if(ok){
    highlightSCN(secId, cardId);
  } else {
    document.removeEventListener('click', blockNextClick, {capture:true});
  }
}, true);

function renderSB(q){
  q=(q||"").toLowerCase();
  const cl=document.getElementById("sb-list"); cl.innerHTML="";
  const gs={};
  SC.forEach(s=>{ if(q&&!s.title.toLowerCase().includes(q)&&!s.g.toLowerCase().includes(q))return; if(!gs[s.g])gs[s.g]=[]; gs[s.g].push(s); });
  Object.keys(gs).forEach(g=>{
    const lb=document.createElement("div");lb.className="grp";lb.textContent=g;cl.appendChild(lb);
    gs[g].forEach(s=>{
      const c=document.createElement("div");c.className="scard";c.draggable=true;
      if((s.type==="start"||s.type==="end"||s.id==="START")&&s.id!=="END_HELP"&&s.id!=="END_USER") c.classList.add("scard-term");
      if(s.type==="decision") c.classList.add("scard-dec");
      // 시작/종료 카드의 경우 ID 기반으로 컬러 보정
      let barColor = TC[s.type];
      if(s.id === "END_HELP") barColor = TC["err"];
      else if(s.id === "END_USER") barColor = TC["warn"];
      else if(s.id === "END_OK") barColor = TC["end"];
      else if(s.id === "END_ERR") barColor = TC["err"];
      c.innerHTML=`<div class="scard-dot" style="background:${barColor}"></div><div class="scard-body"><div class="scard-t">${s.title}</div><div class="scard-s">${s.sec}</div></div>`;
      c.addEventListener("dragstart",ev=>ev.dataTransfer.setData("scid",s.id));
      c.addEventListener("click",()=>spawnCardToCanvas(s.id));
      cl.appendChild(c);
    });
  });
  // 일반 카드 생성 버튼
  const nlb=document.createElement("div");nlb.className="grp";nlb.textContent="빈 카드";cl.appendChild(nlb);
  const nc=document.createElement("div");nc.className="scard";nc.style.cursor="pointer";
  nc.innerHTML=`<div class="scard-dot" style="background:#9b9890"></div><div class="scard-body"><div class="scard-t">일반 카드 추가</div><div class="scard-s">클릭하여 생성</div></div>`;

let rvMode = false;          // 리뷰 모드 on/off
let rvFilter = "all";        // 현재 필터

// 노드에 reviewStatus / reviewComment 기본값 보장
function rvInit(node){
  if(!node.reviewStatus) node.reviewStatus = "none";
  if(!node.reviewComment) node.reviewComment = "";
}

// 노드 DOM에 리뷰 배지 갱신
function rvUpdateBadge(node){
  const el = nEls[node.id];
  if(!el) return;
  const old = el.querySelector(".rv-badge");
  if(old) old.remove();
  el.classList.remove("rv-none","rv-approved","rv-revise","rv-issue");
  if(!rvMode) return;
  const st = node.reviewStatus || "none";
  el.classList.add("rv-"+st);
  if(st === "none") return;
  const badge = document.createElement("div");
  badge.className = `rv-badge rv-${st}`;
  const labels = {approved:"승인", revise:"보완", issue:"이슈"};
  badge.textContent = labels[st] || "";
  el.appendChild(badge);
}

// 전체 노드 배지 갱신
function rvRefreshAllBadges(){
  nodes.forEach(n=>{ rvInit(n); rvUpdateBadge(n); });
}

// 리뷰 필터 적용
function rvApplyFilter(){
  nodes.forEach(n=>{
    const el = nEls[n.id]; if(!el) return;
    const st = n.reviewStatus || "none";
    if(rvFilter === "all"){
      el.classList.remove("rv-hidden");
    } else {
      if(st === rvFilter) el.classList.remove("rv-hidden");
      else el.classList.add("rv-hidden");
    }
  });
}

// 요약 카운트 업데이트
function rvUpdateSummary(){
  let ok=0, rev=0, iss=0;
  nodes.forEach(n=>{
    const st = n.reviewStatus||"none";
    if(st==="approved") ok++;
    else if(st==="revise") rev++;
    else if(st==="issue") iss++;
  });
  document.getElementById("rv-cnt-ok").textContent = ok;
  document.getElementById("rv-cnt-rev").textContent = rev;
  document.getElementById("rv-cnt-iss").textContent = iss;
}

/* ══ FLOW EXPORT / IMPORT ══ */
function flowExport(){
  const data={
    version:1,
    type:"innk-flow",
    exportedAt:new Date().toISOString(),
    viewport:{vx,vy,vz},
    cnt,
    nodes:nodes.map(n=>({...n})),
    edges:edges.map(e=>({...e})),
    tboxes:tboxes.map(t=>({...t})),
    memos:memos.map(m=>({...m})),
    tlinks:tlinks.map(l=>({...l})),
    mlinks:mlinks.map(l=>({...l})),
    scnSections:scnSections.map(s=>({...s,items:s.items.map(it=>({...it}))})),
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const ts=new Date().toISOString().slice(0,16).replace("T","_").replace(/:/g,"-");
  a.href=url; a.download="innk_flow_"+ts+".innkflow"; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  showToast("플로우를 내보냈습니다");
}

function flowImport(file){
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(data.type!=="innk-flow"){showToast("innk-flow 파일만 불러올 수 있습니다");return;}
      if(!await cdlg.confirm("현재 캔버스를 덮어쓰고 불러오시겠습니까?",{okLabel:'불러오기'}))return;
      snap();
      // 기존 DOM 정리
      nodes.forEach(n=>{if(nEls[n.id])nEls[n.id].remove();}); nEls={};
      tboxes.forEach(t=>{if(tEls[t.id])tEls[t.id].remove();}); tEls={};
      memos.forEach(m=>{if(mEls[m.id])mEls[m.id].remove();}); mEls={};
      // 데이터 복원
      nodes=(data.nodes||[]).map(n=>({...n}));
      edges=(data.edges||[]).map(e=>({...e}));
      tboxes=(data.tboxes||[]).map(t=>({...t}));
      memos=(data.memos||[]).map(m=>({...m}));
      tlinks=(data.tlinks||[]).map(l=>({...l}));
      mlinks=(data.mlinks||[]).map(l=>({...l}));
      cnt=data.cnt||nodes.reduce((mx,n)=>Math.max(mx,parseInt(n.id.replace("n",""))||0),0);
      // 시나리오 섹션 복원
      if(data.scnSections&&Array.isArray(data.scnSections)) scnSections=data.scnSections;
      afterImport();
      // 뷰포트 복원
      if(data.viewport){vx=data.viewport.vx||0;vy=data.viewport.vy||0;vz=data.viewport.vz||1;applyVP();}
      // DOM 재빌드
      nodes.forEach(n=>buildNode(n));
      tboxes.forEach(t=>buildTbox(t));
      memos.forEach(m=>buildMemo(m));
      selNode=null;selGroup=new Set();selTGroup=new Set();selEdge=-1;
      dp.classList.remove("open");hideEbar();drawEdges();
      if(rvMode){ rvRefreshAllBadges(); rvApplyFilter(); rvUpdateSummary(); }
      showToast(file.name+" 불러오기 완료");
    }catch(err){showToast("파일 읽기 오류: "+err.message);}
  };
  reader.readAsText(file);
}

/* ══ KEYBOARD ══ */
// 스페이스바 상태 추적
document.addEventListener("keydown", ev=>{
  if(["INPUT","TEXTAREA"].includes(document.activeElement?.tagName)) return;
  if(ev.key===" "||ev.code==="Space"){
    if(!spaceDown){
      spaceDown=true;
      if(!dragState) wrap.style.cursor=getComputedStyle(document.documentElement).getPropertyValue('--cur-canvas-pan').trim()||"grab";
    }
    ev.preventDefault();
  }
}, true);
document.addEventListener("keyup", ev=>{
  if(ev.key===" "||ev.code==="Space"){
    spaceDown=false;
    if(!dragState) wrap.style.cursor="";
  }
});
document.addEventListener("keydown",ev=>{
  const inInput=["INPUT","TEXTAREA"].includes(document.activeElement?.tagName);
  const mod=ev.metaKey||ev.ctrlKey;
  if(mod&&ev.key==="z"&&!ev.shiftKey){ ev.preventDefault(); if(!inInput)undo(); return; }
  if(mod&&(ev.key==="y"||(ev.key==="z"&&ev.shiftKey))){ ev.preventDefault(); if(!inInput)redo(); return; }
  if(mod&&ev.key==="c"){
    if(inInput)return;
    if(selNode){ const n=nodes.find(x=>x.id===selNode); if(n)clipboard={type:"single",node:{...n}}; }
    else if(selGroup.size>0){ clipboard={type:"group",nodes:[...selGroup].map(id=>({...nodes.find(n=>n.id===id)})).filter(Boolean)}; }
    return;
  }
  if(mod&&ev.key==="v"){
    if(inInput||!clipboard)return; ev.preventDefault(); snap();
    if(clipboard.type==="single"){
      const n=clipboard.node, id="n"+(++cnt), nn={...n,id,x:n.x+24,y:n.y+24};
      nodes.push(nn); buildNode(nn);
    } else if(clipboard.type==="group"){
      clipboard.nodes.forEach(n=>{ const id="n"+(++cnt), nn={...n,id,x:n.x+24,y:n.y+24}; nodes.push(nn); buildNode(nn); });
    }
    drawEdges(); return;
  }
  if(inInput)return;
  if(ev.key==="Delete"||ev.key==="Backspace"){
    snap();
    if(selEdge>=0){ edges.splice(selEdge,1); selEdge=-1; hideEbar(); drawEdges(); }
    else if(selGroup.size>1){
      selGroup.forEach(id=>{ edges=edges.filter(e=>e.from!==id&&e.to!==id); tlinks=tlinks.filter(l=>l.nid!==id); mlinks=mlinks.filter(l=>l.nid!==id); nodes=nodes.filter(n=>n.id!==id); if(nEls[id])nEls[id].remove(); delete nEls[id]; });
      selGroup=new Set(); selTGroup=new Set(); dp.classList.remove("open"); drawEdges();
    } else if(selNode){
      edges=edges.filter(e=>e.from!==selNode&&e.to!==selNode); tlinks=tlinks.filter(l=>l.nid!==selNode); mlinks=mlinks.filter(l=>l.nid!==selNode); nodes=nodes.filter(n=>n.id!==selNode);
      if(nEls[selNode])nEls[selNode].remove(); delete nEls[selNode];
      selNode=null; dp.classList.remove("open"); drawEdges();
    }
    return;
  }
  if(ev.key==="Escape"){ clearSel(); hideEbar(); if(tlinking){tlinking=null;prevp.style.display="none";} if(mlinking){mlinking=null;prevp.style.display="none";} if(connecting){connecting=null;prevp.style.display="none";} if(reconnecting){reconnecting=null;prevp.style.display="none";} if(activeSCN)clearSCNHighlight(); }
  // 화살표 키 미세 조정
  if(ev.key==="ArrowLeft"||ev.key==="ArrowRight"||ev.key==="ArrowUp"||ev.key==="ArrowDown"){
    const hasSel = selNode || selGroup.size > 0;
    if(!hasSel) return;
    ev.preventDefault();
    const step = ev.shiftKey ? 10 : 1;
    const dx = ev.key==="ArrowLeft" ? -step : ev.key==="ArrowRight" ? step : 0;
    const dy = ev.key==="ArrowUp"   ? -step : ev.key==="ArrowDown"  ? step : 0;
    snap();
    if(selGroup.size > 0){
      selGroup.forEach(id=>{
        const n=nodes.find(x=>x.id===id); if(!n) return;
        n.x = Math.max(BOUNDARY_X, n.x+dx);
        n.y = Math.max(BOUNDARY_Y, n.y+dy);
        const el=nEls[id]; if(el){ el.style.left=n.x+"px"; el.style.top=n.y+"px"; }
      });
    } else if(selNode){
      const n=nodes.find(x=>x.id===selNode); if(!n) return;
      n.x = Math.max(BOUNDARY_X, n.x+dx);
      n.y = Math.max(BOUNDARY_Y, n.y+dy);
      const el=nEls[selNode]; if(el){ el.style.left=n.x+"px"; el.style.top=n.y+"px"; }
    }
    drawEdges();
    return;
  }
});

/* ══ SPAWN CARD TO CANVAS (사이드바 카드 클릭) ══ */

function spawnBlankCard(){
  snap();
  const wr=wrap.getBoundingClientRect();
  const w=180, h=60;
  const id="n"+(++cnt);
  let cx=(wr.width/2-vx)/vz;
  let cy=(wr.height/2-vy)/vz;
  const PAD=10;
  function overlaps(nx,ny){
    return nodes.some(n=>{
      const nw2=n.isTerm?160:n.isDec?150:180, nh2=n.isTerm?44:n.isDec?96:60;
      return !(nx+w+PAD<n.x||nx>n.x+nw2+PAD||ny+h+PAD<n.y||ny>n.y+nh2+PAD);
    });
  }
  let tx=cx-w/2, ty=Math.max(BOUNDARY_Y,cy-h/2);
  if(overlaps(tx,ty)){
    for(let step=1;step<=12;step++){
      const offsets=[[step*(w+PAD),0],[-(step*(w+PAD)),0],[0,step*(h+PAD)],[0,-(step*(h+PAD))]];
      let found=false;
      for(const [dx,dy] of offsets){
        const nx=cx-w/2+dx, ny=Math.max(BOUNDARY_Y,cy-h/2+dy);
        if(!overlaps(nx,ny)){tx=nx;ty=ny;found=true;break;}
      }
      if(found) break;
    }
  }
  const node={id,scId:null,x:tx,y:ty,label:"새 시나리오",sec:"",type:"normal",isDec:false,isTerm:false,ownScn:currentOwnScn()};
  nodes.push(node); buildNode(node); drawEdges();
  selNode=id;
  document.querySelectorAll(".fn.sel,.dn.sel").forEach(e=>e.classList.remove("sel"));
  const el=nEls[id]; if(el)el.classList.add("sel");
  // 뷰포트 이동
  const wr2=wrap.getBoundingClientRect();
  vx=wr2.width/2-(tx+w/2)*vz;
  vy=wr2.height/2-(ty+h/2)*vz;
  applyVP();
  // 더블클릭 편집 패널 바로 열기
  setTimeout(()=>openEditModal({type:"node",id}),80);
}

function spawnCardToCanvas(scid){
  const sc=SC.find(s=>s.id===scid); if(!sc)return;
  snap();
  const wr=wrap.getBoundingClientRect();
  const isTerm=(sc.type==="start"||sc.type==="end")&&sc.id!=="END_HELP"&&sc.id!=="END_USER";
  const isDecSc=sc.type==="decision";
  const w=isTerm?160:isDecSc?150:180, h=isTerm?44:isDecSc?96:60;
  const id="n"+(++cnt);

  // 뷰포트 중앙에서 시작, 겹치지 않는 위치 탐색
  let cx=(wr.width/2-vx)/vz;
  let cy=(wr.height/2-vy)/vz;
  const PAD=10;
  function overlaps(nx,ny){
    return nodes.some(n=>{
      const nw2=n.isTerm?160:n.isDec?150:180, nh2=n.isTerm?44:n.isDec?96:60;
      return !(nx+w+PAD<n.x||nx>n.x+nw2+PAD||ny+h+PAD<n.y||ny>n.y+nh2+PAD);
    });
  }
  let tx=cx-w/2, ty=Math.max(BOUNDARY_Y,cy-h/2);
  if(overlaps(tx,ty)){
    // 가로로 스캔하며 빈 자리 찾기
    for(let step=1;step<=12;step++){
      const offsets=[[step*(w+PAD),0],[-(step*(w+PAD)),0],[0,step*(h+PAD)],[0,-(step*(h+PAD))]];
      let found=false;
      for(const [dx,dy] of offsets){
        const nx=cx-w/2+dx, ny=Math.max(BOUNDARY_Y,cy-h/2+dy);
        if(!overlaps(nx,ny)){tx=nx;ty=ny;found=true;break;}
      }
      if(found) break;
    }
  }

  const isDec=sc.type==="decision";
  const node={id,scId:sc.id,x:tx,y:ty,label:sc.title,sec:sc.sec,type:sc.type,isDec,isTerm,ownScn:currentOwnScn()};
  nodes.push(node); buildNode(node); drawEdges();
  selNode=id;
  document.querySelectorAll(".fn.sel,.dn.sel").forEach(e=>e.classList.remove("sel"));
  const el=nEls[id]; if(el)el.classList.add("sel");

  // 생성된 노드 중심으로 뷰포트 이동
  const wr2=wrap.getBoundingClientRect();
  vx = wr2.width/2  - (tx + w/2) * vz;
  vy = wr2.height/2 - (ty + h/2) * vz;
  applyVP();

  showToast(`"${sc.title}" 추가됨`+(activeSCN&&activeSCN.cardId!==BLANK_CARD_ID?` → ${activeSCN.cardId}`:''));
}

function getAlignTargets(){
  if(selGroup.size>=2) return [...selGroup].map(id=>nodes.find(n=>n.id===id)).filter(Boolean);
  if(selNode) return [nodes.find(n=>n.id===selNode)].filter(Boolean);

alignMenu.querySelectorAll('.am-btn').forEach(btn=>{
  btn.addEventListener('click',ev=>{
    ev.stopPropagation();
    alignMenu.classList.remove('show');
    const act=btn.dataset.align;
    const targets=getAlignTargets();
    if(targets.length<2){showToast('2개 이상 선택 후 정렬하세요 (Shift+클릭)');return;}
    snap();
    const W=n=>n.isDec?150:n.isTerm?160:180;
    const H=n=>n.isDec?96:n.isTerm?44:52;
    const xs=targets.map(n=>n.x), ys=targets.map(n=>n.y);
    const x2s=targets.map(n=>n.x+W(n)), y2s=targets.map(n=>n.y+H(n));
    const minX=Math.min(...xs), maxX=Math.max(...x2s);
    const minY=Math.min(...ys), maxY=Math.max(...y2s);
    const GAP=24;
    if(act==='left')           targets.forEach(n=>{n.x=minX;});
    else if(act==='right')     targets.forEach(n=>{n.x=maxX-W(n);});
    else if(act==='centerH'){  const mx=(minX+maxX)/2; targets.forEach(n=>{n.x=mx-W(n)/2;}); }
    else if(act==='top')       targets.forEach(n=>{n.y=minY;});
    else if(act==='bottom')    targets.forEach(n=>{n.y=maxY-H(n);});
    else if(act==='centerV'){  const my=(minY+maxY)/2; targets.forEach(n=>{n.y=my-H(n)/2;}); }
    else if(act==='distH'){
      if(targets.length<3){showToast('가로 균등 배분은 3개 이상 필요');return;}
      const s=[...targets].sort((a,b)=>a.x-b.x);
      const tw=s.reduce((a,n)=>a+W(n),0);
      const sp=s[s.length-1].x+W(s[s.length-1])-s[0].x;
      const g=(sp-tw)/(s.length-1); let cx=s[0].x;
      s.forEach(n=>{n.x=cx;cx+=W(n)+g;});
    } else if(act==='distV'){
      if(targets.length<3){showToast('세로 균등 배분은 3개 이상 필요');return;}
      const s=[...targets].sort((a,b)=>a.y-b.y);
      const th=s.reduce((a,n)=>a+H(n),0);
      const sp=s[s.length-1].y+H(s[s.length-1])-s[0].y;
      const g=(sp-th)/(s.length-1); let cy=s[0].y;
      s.forEach(n=>{n.y=cy;cy+=H(n)+g;});
    } else if(act==='gridH'){
      const s=[...targets].sort((a,b)=>a.y-b.y||a.x-b.x);
      const rows=[];
      s.forEach(n=>{const r=rows.find(r=>Math.abs(r[0].y-n.y)<40);r?r.push(n):rows.push([n]);});
      rows.forEach(r=>{r.sort((a,b)=>a.x-b.x);const ry=r[0].y;let cx=r[0].x;r.forEach(n=>{n.x=cx;n.y=ry;cx+=W(n)+GAP;});});
    } else if(act==='gridV'){
      const s=[...targets].sort((a,b)=>a.x-b.x||a.y-b.y);
      const cols=[];
      s.forEach(n=>{const c=cols.find(c=>Math.abs(c[0].x-n.x)<40);c?c.push(n):cols.push([n]);});
      cols.forEach(c=>{c.sort((a,b)=>a.y-b.y);const cx=c[0].x;let cy=c[0].y;c.forEach(n=>{n.x=cx;n.y=cy;cy+=H(n)+GAP;});});
    }
    targets.forEach(n=>{const el=nEls[n.id];if(!el)return;el.style.left=n.x+'px';el.style.top=n.y+'px';});
    drawEdges();
    showToast('정렬 완료 ('+targets.length+'개)');
  });
});

/* ══ SHIFT+클릭 다중 선택 ══
   buildNode의 click 핸들러를 래핑하여 Shift 시 selGroup 토글 */
(()=>{
  const _orig=buildNode;
  buildNode=function(node){
    _orig(node);
    const el=nEls[node.id];
    if(!el)return;
    // Shift+클릭 핸들러 (기존 click 핸들러보다 먼저 동작하도록 capture 단계)
    el.addEventListener('click', ev=>{
      if(!ev.shiftKey) return; // 일반 클릭은 기존 핸들러에 맡김
      if(ev.target.classList.contains('pt')||ev.target.closest('.fn-del,.dn-del'))return;
      ev.stopImmediatePropagation();
      ev.preventDefault();
      // selGroup 토글
      if(selGroup.has(node.id)){
        selGroup.delete(node.id);
        el.classList.remove('grp-sel');
      } else {
        // 기존 단일 선택 노드도 그룹에 흡수
        if(selNode&&!selGroup.has(selNode)){
          selGroup.add(selNode);
          const sn=nEls[selNode]; if(sn){sn.classList.remove('sel');sn.classList.add('grp-sel');}
        }
        selGroup.add(node.id);
        el.classList.remove('sel');
        el.classList.add('grp-sel');
        selNode=null;
        dp.classList.remove('open');
      }
      // 그룹이 1개로 줄면 단일 선택으로 전환
      if(selGroup.size===1){
        const id=[...selGroup][0];
        selGroup=new Set();
        const onlyEl=nEls[id]; if(onlyEl){onlyEl.classList.remove('grp-sel');onlyEl.classList.add('sel');}
        selNode=id;
        const onlyNode=nodes.find(n=>n.id===id); if(onlyNode)openDetail(onlyNode);
        dp.classList.add('open');
      }
    }, true); // capture=true → Shift 클릭을 먼저 낚아챔

    // 신호 미리보기 클릭 연결
    el.addEventListener('click', ev=>{
      if(ev.shiftKey)return;
      if(ev.target.classList.contains('pt')||ev.target.closest('.fn-del,.dn-del'))return;
      // 딤 상태 노드(다른 시나리오)는 신호 미리보기 무시
      if(nl.classList.contains('scn-mode') && !el.classList.contains('scn-hi')) return;
      dpSpShow(node.scId||node.id, node.label, node.sec);
    });
  };
})();

const SP_CW7={':':3,'1':4,'I':3,'T':5,'W':5,'M':5,'%':5,'t':3,'i':2,'n':4,'k':4,' ':2,'<':4};
function spCW(ch){return SP_CW7[ch]??SP_CW7[ch.toUpperCase()]??4;}
function spTW(str){let w=0;[...str].forEach((c,i)=>{w+=spCW(c);if(i<str.length-1)w+=1;});return w;}
function spGlyph(ch){return ch in SP_F7?ch:ch.toUpperCase();}
function spPx(str,dc=0,dr=0){const pts=[];let col=dc;for(const ch of str){(SP_F7[spGlyph(ch)]||[]).forEach(([r,c])=>pts.push([dr+r,col+c]));col+=spCW(ch)+1;}return pts;}

const SPC=20,SPR=7,SPD=5,SPG=2;
const SP_CW_PX=SPC*(SPD+SPG)-SPG;
const SP_CH_PX=SPR*(SPD+SPG)-SPG;

/* ── Audio ── */
let spACtx=null, spMuted=true;
function spGetACtx(){if(!spACtx)spACtx=new(window.AudioContext||window.webkitAudioContext)();if(spACtx.state==='suspended')spACtx.resume();return spACtx;}
function spTone(f,d,t='sine',v=0.15,a=0.01,r=0.05){if(spMuted)return;const ctx=spGetACtx(),osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(ctx.destination);osc.type=t;osc.frequency.value=f;const n=ctx.currentTime;g.gain.setValueAtTime(0,n);g.gain.linearRampToValueAtTime(v,n+a);g.gain.setValueAtTime(v,n+d-r);g.gain.linearRampToValueAtTime(0,n+d);osc.start(n);osc.stop(n+d);}
const SP_SFX={
  none:()=>{},
  single: ()=>spTone(880,.12,'sine',.18,.005,.06),
  double: ()=>{spTone(880,.1,'sine',.16,.005,.04);setTimeout(()=>spTone(880,.1,'sine',.16,.005,.04),160);},
  melody: ()=>{spTone(660,.13,'sine',.16,.005,.05);setTimeout(()=>spTone(880,.13,'sine',.16,.005,.05),160);setTimeout(()=>spTone(1100,.2,'sine',.18,.005,.08),320);},
  warn:   ()=>{spTone(330,.14,'square',.12,.005,.05);setTimeout(()=>spTone(330,.14,'square',.12,.005,.05),220);},
  error:  ()=>{spTone(660,.1,'sawtooth',.14,.005,.04);setTimeout(()=>spTone(440,.1,'sawtooth',.14,.005,.04),130);setTimeout(()=>spTone(220,.18,'sawtooth',.14,.005,.07),260);},
  connect:()=>{spTone(660,.1,'sine',.16,.005,.04);setTimeout(()=>spTone(990,.18,'sine',.18,.005,.07),140);},
};
function spPlaySnd(soundId){
  (SP_SFX[soundId]||SP_SFX.none)();
  if(spMuted||!soundId||soundId==='none')return;
  const bars=document.querySelectorAll('#dp-sp-snd-bars .dp-sp-snd-bar');
  [8,12,6,10].forEach((h,i)=>{if(bars[i])bars[i].style.height=h+'px';});
  setTimeout(()=>bars.forEach(b=>{b.style.height='2px';}),420);
}
